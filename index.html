<!DOCTYPE html>
<html lang="tg" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат бо функсияи Невидимка ва Лички (Whereby)</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #f5f7fb; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh; overflow: hidden; transition: background-color 0.3s;
        }

        body, button, .nav-item, .item-card, .chat-header, .online-status-badge, .profile-ctrl-btn, .pm-user-row, .msg-username, .msg-footer {
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; 
        }

        input, textarea, .msg-text, .toast-input {
            -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
        }

        img { -webkit-user-drag: none; -webkit-touch-callout: none; user-select: none; }

        .phone-container { 
            width: 100%; max-width: 480px; height: 100vh; height: 100dvh; background: #f8fafc; 
            display: flex; flex-direction: column; position: relative; box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            overflow: hidden; transition: background 0.3s;
        }
        
        .screen { 
            display: none; flex-direction: column; flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; 
            -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none; transition: background 0.3s;
        }
        .screen::-webkit-scrollbar { display: none; } 

        .active-screen { display: flex; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
         
        #home-screen { display: none; flex-direction: column; height: 100%; overflow: hidden; padding-bottom: 0; background: #f8fafc; }
        #home-screen.active-screen { display: flex; }
        
        #all-rooms-list { 
            flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; 
            background: transparent; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; 
        }
        #all-rooms-list::-webkit-scrollbar { display: none; }

        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; z-index: 100; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: absolute; width: 100%; padding: 20px; }
        .auth-form { width: 100%; max-width: 350px; background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }

        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 50; display: none; flex-direction: column; overflow: hidden; }
        
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        
        .chat-header-left { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding-right: 5px; }
        .chat-header-actions { position: relative; display: flex; align-items: center; gap: 8px; }
        .chat-header-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px; }
        .chat-header-dropdown { display: none; position: absolute; top: 35px; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 250; width: 160px; overflow: hidden; }
        .chat-header-dropdown button { width: 100%; padding: 12px 16px; border: none; background: none; text-align: left; font-size: 14px; font-weight: 500; color: #334155; cursor: pointer; }
        .chat-header-dropdown button:hover { background: #f1f5f9; }

        /* Нуқтаи 8: Закрепит */
        .pinned-msg-bar { background: #ffffff; padding: 8px 15px; font-size: 13px; color: #4a5568; border-bottom: 1px solid #e2e8f0; display: none; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .pinned-msg-bar:active { background: #f8fafc; }
         
        .chat-messages { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }
         
        .date-divider { text-align: center; margin: 10px 0; display: flex; align-items: center; justify-content: center; width: 100%; }
        .date-divider span { background: rgba(0, 0, 0, 0.06); color: #666; padding: 4px 14px; border-radius: 12px; font-size: 11px; font-weight: 500; }

        .msg-wrapper { display: flex; gap: 8px; width: 100%; max-width: 85%; margin-bottom: 2px; position: relative; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.other { align-self: flex-start; flex-direction: row; }
         
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #e2e8f0; flex-shrink: 0; }
         
        .msg-body { display: flex; flex-direction: column; max-width: calc(100% - 40px); position: relative; }
        .msg-wrapper.me .msg-body { align-items: flex-end; }
        .msg-wrapper.other .msg-body { align-items: flex-start; }
         
        .msg-username { font-size: 11px; color: #718096; font-weight: 600; margin-bottom: 2px; padding: 0 4px; }
         
        .msg-bubble { position: relative; border-radius: 16px; padding: 10px 14px; padding-bottom: 24px; min-width: 100px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .msg-wrapper.me .msg-bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; padding-top: 18px; } 
        .msg-wrapper.other .msg-bubble { background: white; color: #333; border-bottom-left-radius: 4px; }
         
        .msg-text { font-size: 15px; word-break: break-word; overflow-wrap: break-word; line-height: 20px; }

        .msg-footer { position: absolute; bottom: 4px; right: 10px; display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .msg-wrapper.me .msg-footer { color: rgba(255, 255, 255, 0.75); }
        .msg-wrapper.other .msg-footer { color: #a0aec0; }

        /* Нуқтаи 8: Реаксияҳо */
        .msg-reactions { position: absolute; bottom: -12px; right: 10px; background: white; border-radius: 12px; padding: 2px 6px; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 4px; z-index: 2; border: 1px solid #edf2f7; }

        .msg-ticks { display: inline-flex; align-items: center; margin-left: 2px; position: relative; height: 14px; }
        .tick { display: inline-block; width: 10px; height: 14px; position: relative; }
        .tick::after { content: ''; display: block; width: 5px; height: 9px; border-right: 2px solid currentColor; border-bottom: 2px solid currentColor; transform: rotate(40deg) skewX(-5deg); position: absolute; top: 1px; left: 1px; }
        .tick-double { display: inline-flex; align-items: center; }
        .tick-double .tick:nth-child(2) { margin-left: -5px; }
        .ticks-sent { color: rgba(255,255,255,0.7); }
        .ticks-delivered { color: rgba(255,255,255,0.7); }
        .ticks-read .tick { color: #a8d5f7; }

        .badge { background: #ff3b30; color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: bold; display: inline-block; min-width: 18px; text-align: center; }
        .nav-item { position: relative; }
        .nav-badge { position: absolute; top: 4px; right: 22%; background: #ff3b30; color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: bold; min-width: 16px; text-align: center; display: none; }

        .chat-input-area { padding: 10px; background: white; display: flex; gap: 8px; border-top: 1px solid #edf2f7; align-items: flex-end; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: relative; }
        #message-input { flex: 1; width: 0; height: 40px; max-height: 100px; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 18px; font-size: 15px; background: #f8fafc; outline: none; resize: none; overflow-y: auto; line-height: 20px; }
        .chat-blocked-notice { width: 100%; text-align: center; padding: 12px; font-size: 14px; color: #718096; background: #edf2f7; font-weight: 500; display: none; }

        /* Нуқтаи 16: Менюи файлҳо */
        .attachment-menu { display: none; position: absolute; bottom: 60px; left: 10px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; z-index: 100; overflow: hidden; width: 150px; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .attachment-menu button { display: block; width: 100%; padding: 12px; border: none; background: none; text-align: left; font-size: 14px; cursor: pointer; color: #334155; }
        .attachment-menu button:hover { background: #f1f5f9; }

        input[type="text"], input[type="tel"], input[type="password"], select { width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; background: #f8fafc; outline: none; -webkit-appearance: none; }
        input:focus, #message-input:focus, select:focus { border-color: #667eea; background: #fff; }
         
        .password-container { position: relative; width: 100%; }
        .password-container input { padding-right: 45px; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #718096; outline: none; }

        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; opacity: 0.5; transition: opacity 0.3s; }
        .btn.active-btn { opacity: 1; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; margin-top: 8px; opacity: 1; }
        .btn-danger { background: linear-gradient(135deg, #f56565 0%, #c53030 100%); color: white; margin-top: 8px; opacity: 1; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; width: auto; display: inline-block; margin-top: 10px; }

        .create-room-box, .edit-profile-box { display: none; background: white; padding: 15px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-top: 10px; animation: slideDown 0.2s ease-in-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card { 
            background: #ffffff; padding: 16px; margin-bottom: 14px; border-top-left-radius: 20px; border-top-right-radius: 20px; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; border: 1px solid rgba(102, 126, 234, 0.12); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.05), 0 1px 3px rgba(0, 0, 0, 0.01); display: flex; flex-direction: column; gap: 12px; cursor: pointer; position: relative; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .item-card:hover, .item-card:active { transform: translateY(-3px) scale(1.01); box-shadow: 0 12px 24px rgba(102, 126, 234, 0.12); border-color: rgba(102, 126, 234, 0.3); }
        .card-main-info { display: flex; align-items: center; width: 100%; justify-content: space-between; }
        .card-info { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
         
        .room-avatar, .user-avatar { width: 48px; height: 48px; border-radius: 16px; background: #f1f5f9; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border: 2px solid #ffffff; flex-shrink: 0; }
        
        .profile-avatar-big { width: 68px; height: 68px; border-radius: 18px; background: #e2e8f0; object-fit: cover; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border: 2px solid white; transform: rotate(0deg);  }
        .lock-icon { font-size: 15px; margin-left: auto; background: #f8fafc; padding: 6px 10px; border-radius: 12px; color: #64748b; border: 1px solid #edf2f7; }

        .manage-btn { background: #f8fafc; color: #6366f1; border: 1px solid #e0e7ff; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; transition: all 0.2s; }
        .manage-btn:hover { background: #eef2ff; border-color: #c7d2fe; }

        .manage-menu { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; margin-top: 5px; animation: fadeIn 0.2s ease; }
        .menu-item { width: 100%; text-align: left; padding: 8px 12px; border: none; background: none; font-size: 13px; font-weight: 500; color: #334155; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
        .menu-item:hover { background: #e2e8f0; }
        .menu-item.danger { color: #dc2626; }
        .menu-item.danger:hover { background: #fee2e2; }

        .bottom-nav { height: calc(65px + env(safe-area-inset-bottom)); border-top: 1px solid #edf2f7; border-top-left-radius: 25px; border-top-right-radius: 25px; display: flex; justify-content: space-around; align-items: center; background: #f8fafc; flex-shrink: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); box-shadow: none; }
        .nav-item { border: none; background: none; font-size: 12px; color: #a0aec0; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; height: 100%; justify-content: center; transition: color 0.2s; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; transition: transform 0.2s; }
        .nav-item.active { color: #667eea; font-weight: 600; }
        .nav-item.active svg { transform: scale(1.05); }
         
        .user-profile-box { background: linear-gradient(135deg, #eef2f7 0%, #dde5ed 100%); padding: 20px; border-radius: 30px 15px 45px 15px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.6); display: flex; align-items: center; gap: 15px; position: relative; box-shadow: 0 10px 25px rgba(102, 126, 234, 0.08), inset 0 1px 0 rgba(255,255,255,0.8); }
        
        .profile-top-controls { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .profile-ctrl-btn { background: #ffffff; border: 1px solid #e2e8f0; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all 0.2s; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .profile-ctrl-btn:hover { background: #f1f5f9; transform: scale(1.05); }
        
        .profile-settings-dropdown { display: none; position: absolute; top: 40px; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 200; width: 160px; overflow: hidden; animation: slideDown 0.15s ease-in-out; }
        .profile-settings-dropdown button { width: 100%; padding: 10px 14px; border: none; background: none; text-align: left; font-size: 13px; font-weight: 500; color: #334155; cursor: pointer; }
        .profile-settings-dropdown button:hover { background: #f1f5f9; }
        .profile-settings-dropdown button.logout-item { color: #dc2626; border-top: 1px solid #f1f5f9; }

        /* Нуқтаи 4: Ислоҳи z-index дар личка */
        .pm-user-row { background: #ffffff; padding: 14px; border-radius: 18px 18px 28px 28px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #edf2f7; cursor: pointer; box-shadow: 0 4px 12px rgba(102,126,234,0.03); transition: all 0.2s; position: relative; z-index: 1; }
        .pm-user-row:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(102,126,234,0.06); border-color: rgba(102,126,234,0.15); z-index: 10; }
        .pm-row-left { display: flex; align-items: center; gap: 12px; overflow: hidden; flex: 1; }
        .pm-meta-text { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
        .pm-meta-text b { font-size: 15px; color: #1e293b; }
        .pm-meta-text .city-tag { font-size: 12px; color: #667eea; font-weight: 500; }
        .pm-meta-text p { font-size: 13px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .pm-row-right { display: flex; align-items: center; gap: 6px; margin-left: 10px; position: relative; }
        .pm-dots-btn { background: none; border: none; font-size: 18px; font-weight: bold; color: #94a3b8; cursor: pointer; padding: 4px 8px; border-radius: 50%; transition: background 0.2s; }
        .pm-dots-btn:hover { background: #f1f5f9; color: #475569; }

        .pm-context-dropdown { display: none; position: absolute; top: 32px; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 999; width: 160px; overflow: hidden; animation: slideDown 0.15s ease-in-out; }
        .pm-context-dropdown button { width: 100%; padding: 11px 14px; border: none; background: none; text-align: left; font-size: 13px; font-weight: 500; color: #334155; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .pm-context-dropdown button:hover { background: #f1f5f9; }
        .pm-context-dropdown button.pm-danger-item { color: #ef4444; }
        .pm-context-dropdown button.pm-danger-item:hover { background: #fee2e2; }

        /* Нуқтаи 6 ва 8: Меню барои паёмакҳо */
        .msg-context-menu { display: none; position: fixed; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999; width: 180px; overflow: hidden; animation: slideDown 0.15s ease-in-out; }
        .msg-context-menu button { width: 100%; padding: 12px 16px; border: none; background: none; text-align: left; font-size: 14px; font-weight: 500; color: #334155; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .msg-context-menu button:hover { background: #f1f5f9; }
        .msg-context-menu .msg-danger-item { color: #ef4444; border-top: 1px solid #edf2f7; }
        .msg-context-menu .msg-danger-item:hover { background: #fee2e2; }
        .reaction-row { display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid #edf2f7; background: #f8fafc; }
        .reaction-btn { background: none; border: none; font-size: 20px; cursor: pointer; transition: transform 0.2s; }
        .reaction-btn:hover { transform: scale(1.3); }

        .online-status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #10b981; font-weight: bold; }
        .online-dot-blinking { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulseGlow 1.5s infinite; }
        @keyframes pulseGlow { 0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 8px 2px rgba(16, 185, 129, 0.5); } 100% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Нуқтаи 2: Тарҳи нави шабака */
        .network-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); padding: 10px 20px; font-size: 13px; font-weight: 600; text-align: center; z-index: 99999; display: none; align-items: center; justify-content: center; gap: 8px; border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: slideDownNet 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideDownNet { from { top: -50px; opacity: 0; } to { top: 15px; opacity: 1; } }
        .network-offline { background: #ef4444; color: white; border: 2px solid #b91c1c; }
        .network-online { background: #10b981; color: white; border: 2px solid #047857; }

        .contacts-tabs { display: flex; background: #e2e8f0; padding: 4px; border-radius: 16px; margin-bottom: 10px; gap: 4px; }
        .contact-tab-btn { flex: 1; background: none; border: none; padding: 10px 12px; font-size: 13px; font-weight: 700; color: #4a5568; cursor: pointer; text-align: center; border-radius: 12px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .contact-tab-btn.active { background: #ffffff; color: #667eea; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); }
        .chat-header-subtitle { font-size: 11px; color: rgba(255, 255, 255, 0.85); font-weight: 500; display: flex; align-items: center; gap: 4px; margin-top: 1px; }

        body.dark-mode { background-color: #0f172a; color: #f8fafc; }
        body.dark-mode .phone-container { background: #1e293b; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        body.dark-mode .screen, body.dark-mode #home-screen, body.dark-mode #all-rooms-list, body.dark-mode #my-rooms-list, body.dark-mode #private-chats-screen { background: #1e293b !important; }
        body.dark-mode .item-card, body.dark-mode .pm-user-row, body.dark-mode .profile-header-container, body.dark-mode .contacts-header-wrapper { background: #334155; border-color: rgba(255,255,255,0.08); color: #f8fafc; }
        body.dark-mode .pm-meta-text b, body.dark-mode .rooms-list-title h3, body.dark-mode h3 { color: #f8fafc !important; }
        body.dark-mode .pm-meta-text p, body.dark-mode .lock-icon, body.dark-mode .manage-btn { color: #cbd5e1; background: #475569; border-color: #475569; }
        body.dark-mode .chat-input-area, body.dark-mode #search-input, body.dark-mode .contacts-sticky-header, body.dark-mode .rooms-title-container { background: #1e293b; }
        body.dark-mode #message-input, body.dark-mode input, body.dark-mode select { background: #334155; color: white; border-color: #475569; }
        body.dark-mode .msg-bubble { background: #475569; color: white; }
        body.dark-mode .profile-ctrl-btn { background: #334155; border-color: #475569; }
        body.dark-mode .profile-settings-dropdown, body.dark-mode .profile-context-menu, body.dark-mode .pm-context-dropdown, body.dark-mode .chat-header-dropdown, body.dark-mode .msg-context-menu { background: #334155; border-color: #475569; }

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com", 
        projectId: "live-chat-ea070"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const WHEREBY_PROXY_URL = "https://ancient-breeze-5dc2.kholidtj1995.workers.dev";

    let userData = { name: "", phone: "", img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" };
    let currentChatRoomId = "";
    let currentChatType = "room";
    let roomsData = [];
    
    let previousScreenId = 'home-screen'; // Нуқтаи 3
    let previousScreenBtn = null;
    let currentPlayingAudio = null; // Нуқтаи 5
    let selectedMsgId = null; // Барои менюи паёмак
    
    let isViewerInLiveRoom = false; 
    let activeCallSession = null;

    const subscribeAlertSound = new Audio("https://raw.githubusercontent.com/kholidtj1995/live-chat/main/kolokolchik.mp3");

    // Нуқтаи 13: Санҷиши вуруд
    function checkAuthInputs() {
        let n = document.getElementById('username').value.trim();
        let p = document.getElementById('userphone').value.trim();
        let pw = document.getElementById('userpass').value.trim();
        let btn = document.getElementById('login-btn');
        if(n && p && pw.length >= 4) {
            btn.disabled = false; btn.classList.add('active-btn');
        } else {
            btn.disabled = true; btn.classList.remove('active-btn');
        }
    }

    function togglePasswordVisibility(id, btn) {
        let el = document.getElementById(id);
        if(el.type === "password") { el.type = "text"; btn.innerText = "🙈"; } 
        else { el.type = "password"; btn.innerText = "👁️"; }
    }

    function login() {
        let name = document.getElementById('username').value.trim();
        let phone = document.getElementById('phone-country-code').value + document.getElementById('userphone').value.trim();
        let pass = document.getElementById('userpass').value.trim();
        
        database.ref('users/' + phone).once('value', snap => {
            let user = snap.val();
            if(user) {
                if(user.password === pass) {
                    userData = user;
                    enterApp();
                } else showSmartAlert("Рамз нодуруст аст!");
            } else {
                userData = { name, phone, password: pass, img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" };
                database.ref('users/' + phone).set(userData).then(enterApp);
            }
        });
    }

    // Нуқтаи 1: Гузариши автомати ба Я
    function enterApp() {
        document.getElementById('auth-screen').style.display = 'none';
        initNetworkChecker();
        loadRoomsFromServer();
        setTimeout(() => {
            document.querySelector('.bottom-nav .nav-item:nth-child(3)').click();
        }, 100);
    }

    // Нуқтаи 3: Саҳифаи пешина
    function switchScreen(screenId, btn) {
        let active = document.querySelector('.screen.active-screen');
        if(active && active.id !== screenId) previousScreenId = active.id;
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(btn) { btn.classList.add('active'); previousScreenBtn = btn; }
    }

    // Нуқтаи 2: Шабака
    function initNetworkChecker() {
        const netBar = document.getElementById('network-status-bar');
        function updateStatus() {
            if (navigator.onLine) {
                netBar.className = 'network-bar network-online';
                netBar.innerHTML = '📶 Интернет барқарор шуд!';
                netBar.style.display = 'flex';
                setTimeout(() => netBar.style.display = 'none', 3000);
            } else {
                netBar.className = 'network-bar network-offline';
                netBar.innerHTML = '🔌 Шумо офлайн ҳастед!';
                netBar.style.display = 'flex';
            }
        }
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
    }

    // Нуқтаи 16: Менюи файлҳо
    function toggleAttachMenu(e) {
        e.stopPropagation();
        let m = document.getElementById('attachment-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener("click", e => {
        document.getElementById('attachment-menu').style.display = 'none';
        document.getElementById('msg-context-menu').style.display = 'none';
    });

    // Нуқтаи 17: Сжатие расм то ~40KB (quality 0.35)
    function handleChatFileSelect(input, type) {
        if(!input.files[0]) return;
        let file = input.files[0];
        if(type === 'image') {
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = e => {
                let img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    let canvas = document.createElement('canvas');
                    let maxW = 300; let scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    sendSpecialMessage(canvas.toDataURL('image/jpeg', 0.35), 'image', file.name);
                }
            }
        } else {
            sendSpecialMessage(file.name, 'file', file.name);
        }
    }

    function autoGrow(el) { el.style.height = "40px"; el.style.height = (el.scrollHeight) + "px"; }
    function handleTyping() {}

    // Нуқтаи 14: Ирсоли фаврӣ
    function sendMessage() {
        let input = document.getElementById('message-input');
        let text = input.value.trim();
        if(!text) return;
        
        let list = document.getElementById('chat-messages-list');
        list.innerHTML += `<div class="msg-wrapper me" style="opacity:0.7;"><div class="msg-body"><div class="msg-bubble"><div class="msg-text">${text}</div></div></div></div>`;
        list.scrollTop = list.scrollHeight;
        input.value = ""; input.style.height = "40px";

        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        database.ref(dbPath).push().set({
            phone: userData.phone, username: userData.name, img: userData.img,
            text: text, msgType: 'text', timestamp: Date.now()
        });
    }

    function sendSpecialMessage(data, type, fname) {
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        database.ref(dbPath).push().set({
            phone: userData.phone, username: userData.name, text: (type==='image'?'🖼️ Расм':'📎 Файл'),
            fileData: data, fileName: fname, msgType: type, timestamp: Date.now()
        });
    }

    // Нуқтаи 5: Овозҳо
    function playAudioMsg(btn, src) {
        if(currentPlayingAudio && currentPlayingAudio.src !== src) {
            currentPlayingAudio.pause(); currentPlayingAudio.currentTime = 0;
            document.querySelectorAll('.audio-play-btn').forEach(b => b.innerText = "▶️");
        }
        if(!currentPlayingAudio || currentPlayingAudio.src !== src) currentPlayingAudio = new Audio(src);
        
        if(currentPlayingAudio.paused) {
            currentPlayingAudio.play(); btn.innerText = "⏸️";
        } else {
            currentPlayingAudio.pause(); btn.innerText = "▶️";
        }
    }

    // Нуқтаи 6 ва 8: Менюи паёмакҳо
    window.showMsgMenu = function(e, id, phone) {
        e.preventDefault(); e.stopPropagation();
        selectedMsgId = id;
        let m = document.getElementById('msg-context-menu');
        m.style.left = e.pageX + 'px'; m.style.top = e.pageY + 'px';
        m.style.display = 'block';
        document.getElementById('msg-del-btn').style.display = (phone === userData.phone) ? 'block' : 'none';
        document.getElementById('msg-pin-btn').style.display = (currentChatType === 'room') ? 'block' : 'none';
    };

    function deleteCurrentMsg() {
        if(!selectedMsgId) return;
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        database.ref(dbPath + '/' + selectedMsgId).remove();
        document.getElementById('msg-context-menu').style.display = 'none';
    }

    function replyToMsg() {
        document.getElementById('message-input').value = "Ҷавоб: ";
        document.getElementById('message-input').focus();
        document.getElementById('msg-context-menu').style.display = 'none';
    }

    function pinCurrentMsg() {
        if(currentChatType === 'room') {
            database.ref('rooms/' + currentChatRoomId).update({ pinnedMsg: selectedMsgId });
            showSmartAlert("Паёмак закрепит шуд!");
        }
        document.getElementById('msg-context-menu').style.display = 'none';
    }

    function addReaction(emoji) {
        if(!selectedMsgId) return;
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        database.ref(dbPath + '/' + selectedMsgId + '/reaction').set(emoji);
        document.getElementById('msg-context-menu').style.display = 'none';
    }

    // Нуқтаи 9: Обуна ва зангула
    function tryEnterRoom(roomId) {
        subscribeAlertSound.pause(); // Хомуш ҳангоми даромадан
        let room = roomsData.find(r => r.id === roomId);
        if(room) openChat(room.name, room.img, roomId, 'room');
    }

    function openChat(name, img, id, type) {
        currentChatRoomId = id; currentChatType = type;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        
        // Нуқтаи 7: Танҳо админ
        let room = roomsData.find(r => r.id === id);
        let inputZone = document.getElementById('chat-input-zone');
        let blockNotice = document.getElementById('chat-blocked-notice');
        if(type === 'room' && room && room.onlyAdminCanWrite && room.creatorPhone !== userData.phone) {
            inputZone.style.display = 'none'; blockNotice.style.display = 'block';
        } else {
            inputZone.style.display = 'flex'; blockNotice.style.display = 'none';
        }

        // Нуқтаи 12: Шумораи обуначиён
        if(type === 'room') {
            database.ref('room_subscribers/' + id).once('value', s => {
                let count = s.exists() ? Object.keys(s.val()).length : 0;
                document.getElementById('chat-user-status-subtitle').innerHTML = `👥 ${count} обуначӣ`;
            });
            // Нуқтаи 8: Закреп намоиш
            database.ref('rooms/' + id + '/pinnedMsg').on('value', s => {
                let pId = s.val();
                if(pId) {
                    document.getElementById('pinned-msg-bar').style.display = 'flex';
                    document.getElementById('pinned-text').innerText = "Паёмаки муҳим";
                    if(room.creatorPhone === userData.phone) document.getElementById('unpin-btn').style.display = 'block';
                } else document.getElementById('pinned-msg-bar').style.display = 'none';
            });
            
            // Нуқтаи 10: Whereby Viewers
            if(room && room.liveChannel && room.creatorPhone !== userData.phone) {
                let c = document.getElementById('whereby-embed-container');
                c.innerHTML = `<whereby-embed room="${room.liveChannel}?audio=off&video=off" minimal></whereby-embed>`;
                c.style.display = 'block';
                isViewerInLiveRoom = true;
            }
        }

        let dbPath = type === 'room' ? 'messages/' + id : 'private_messages/' + id;
        database.ref(dbPath).on('value', snap => {
            if(currentChatRoomId !== id) return;
            let html = "";
            let msgs = snap.val() ? Object.keys(snap.val()).map(k=>({id:k, ...snap.val()[k]})) : [];
            msgs.sort((a,b)=>a.timestamp-b.timestamp).forEach(m => {
                let isMe = m.phone === userData.phone;
                let reactHTML = m.reaction ? `<div class="msg-reactions">${m.reaction}</div>` : '';
                let content = m.msgType === 'image' ? `<img src="${m.fileData}" style="width:100px; border-radius:8px;">` :
                              m.msgType === 'file' ? `📄 ${m.fileName}` : m.text;
                
                html += `<div class="msg-wrapper ${isMe?'me':'other'}" oncontextmenu="showMsgMenu(event, '${m.id}', '${m.phone}')">
                    <img src="${m.img || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="msg-avatar">
                    <div class="msg-body">
                        <span class="msg-username">${m.username}</span>
                        <div class="msg-bubble">${content}${reactHTML}</div>
                    </div>
                </div>`;
            });
            let list = document.getElementById('chat-messages-list');
            list.innerHTML = html;
            list.scrollTop = list.scrollHeight;
        });
    }

    function unpinMessage() {
        database.ref('rooms/' + currentChatRoomId).update({ pinnedMsg: null });
    }

    function exitAndClearActiveChat() {
        document.getElementById('chat-window').style.display = 'none';
        if(isViewerInLiveRoom) { document.getElementById('whereby-embed-container').innerHTML = ''; isViewerInLiveRoom = false; }
        database.ref(currentChatType === 'room' ? 'messages/'+currentChatRoomId : 'private_messages/'+currentChatRoomId).off();
        currentChatRoomId = "";
        switchScreen(previousScreenId, previousScreenBtn); // Нуқтаи 3
    }

    // Нуқтаи 10: Баромадан ва пӯшидани эфир
    window.addEventListener("beforeunload", () => {
        if(isViewerInLiveRoom) document.getElementById('whereby-embed-container').innerHTML = '';
    });

    function loadRoomsFromServer() {
        database.ref('rooms').on('value', snap => {
            roomsData = snap.val() ? Object.keys(snap.val()).map(k=>({id:k, ...snap.val()[k]})) : [];
            let html = "";
            roomsData.forEach(r => {
                html += `<div class="item-card" onclick="tryEnterRoom('${r.id}')">
                    <div class="card-main-info">
                        <img src="${r.img}" class="room-avatar">
                        <div class="card-info"><b>🏢 ${r.name}</b></div>
                    </div>
                </div>`;
            });
            document.getElementById('all-rooms-list').innerHTML = html;
        });
    }

    function toggleRoomForm(show) { document.getElementById('room-form-box').style.display = show ? 'block' : 'none'; }
    
    function createRoom() {
        let name = document.getElementById('room-name').value;
        if(!name) return;
        database.ref('rooms').push().set({
            name: name, creatorPhone: userData.phone, img: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        }).then(() => { toggleRoomForm(false); });
    }

    function showSmartAlert(msg) {
        document.getElementById('toast-msg').innerText = msg;
        document.getElementById('toast-buttons-container').innerHTML = `<button class="toast-btn toast-btn-ok" onclick="document.getElementById('smart-toast-overlay').style.display='none'">OK</button>`;
        document.getElementById('smart-toast-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
