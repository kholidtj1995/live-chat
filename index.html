<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <title>Системаи Бақайдгирӣ</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { width: 350px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        .phone-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div id="auth-box" class="box">
    <h2>Бақайдгирӣ</h2>
    <input type="text" id="fullname" placeholder="Ному насаб">
    
    <div class="phone-group">
        <input type="text" id="cityCode" placeholder="+992" style="width: 30%;">
        <input type="text" id="phone" placeholder="Рақами телефон" style="width: 70%;">
    </div>

    <input type="password" id="password" placeholder="Пароли худро эҷод кунед">
    
    <button onclick="handleAuth()">Сабт ё Ворид шудан</button>
</div>

<div id="main-box" class="box" style="display:none; text-align: center;">
    <h1>Хуш омадед!</h1>
    <p>Шумо бомуваффақият ворид шудед.</p>
    <button onclick="logout()" style="background-color: #dc3545;">Баромадан</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com",
        projectId: "live-chat-ea070",
        storageBucket: "live-chat-ea070.firebasestorage.app",
        messagingSenderId: "321161064947",
        appId: "1:321161064947:web:53603c0e1be0b3baf66286"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-box').style.display = 'block';
        }
    });

    window.handleAuth = async () => {
        const fullname = document.getElementById('fullname').value;
        const cityCode = document.getElementById('cityCode').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        
        // Барои Firebase Authentication ҳатман Email лозим аст, 
        // бинобар ин мо рақамро ҳамчун email истифода мебарем:
        const pseudoEmail = phone.replace(/\s+/g, '') + "@user.app";

        try {
            const cred = await createUserWithEmailAndPassword(auth, pseudoEmail, password);
            await set(ref(db, 'users/' + cred.user.uid), {
                fullname, 
                fullPhone: cityCode + phone
            });
            alert("Сабти ном муваффақ шуд!");
        } catch (e) {
            try {
                await signInWithEmailAndPassword(auth, pseudoEmail, password);
                alert("Хуш омадед!");
            } catch (err) {
                alert("Хатогӣ: Маълумот нодуруст аст ё корбар аллакай мавҷуд аст.");
            }
        }
    };

    window.logout = () => {
        signOut(auth).then(() => {
            location.reload();
        });
    };
</script>
</body>
</html>
