<!DOCTYPE html>
<html lang="tg" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат бо функсияи Невидимка ва Лички (Agora)</title>
    <style>
        /* CSS-и шумо дар ин ҷо боқӣ мемонад */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f5f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; overflow: hidden; transition: background-color 0.3s; }
        .phone-container { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; background: #f8fafc; display: flex; flex-direction: column; position: relative; box-shadow: 0 8px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .screen { display: none; flex-direction: column; flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }
        .active-screen { display: flex; animation: fadeIn 0.2s ease-in-out; }
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; z-index: 100; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: absolute; width: 100%; padding: 20px; }
        .auth-form { width: 100%; max-width: 350px; background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 50; display: none; flex-direction: column; }
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .bottom-nav { height: calc(65px + env(safe-area-inset-bottom)); border-top: 1px solid #edf2f7; display: flex; justify-content: space-around; align-items: center; background: #f8fafc; }
        .nav-item { border: none; background: none; font-size: 12px; color: #a0aec0; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; }
        .nav-item.active { color: #667eea; font-weight: 600; }
        #agora-video-view { width: 100%; height: 250px; background: #000; display: none; border-radius: 12px; margin-top: 5px; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-form">
            <h2>Воридшавӣ</h2>
            <input type="text" id="username" placeholder="Номи шумо...">
            <input type="tel" id="userphone" placeholder="Телефон (+992...)">
            <input type="password" id="userpass" placeholder="Рамз...">
            <button class="btn" onclick="login()">Ворид шудан</button>
        </div>
    </div>

    <!-- Chat Window -->
    <div id="chat-window">
        <div class="chat-header">
            <button class="back-btn" onclick="exitAndClearActiveChat()">←</button>
            <h4 id="chat-title">Чат</h4>
        </div>
        <div id="agora-video-view"></div>
        <div class="chat-messages" id="chat-messages-list"></div>
        <div class="chat-input-area">
            <textarea id="message-input" placeholder="Паёмак..."></textarea>
            <button class="btn" onclick="sendMessage()" style="width: auto;">Фиристодан</button>
        </div>
    </div>

    <!-- Main Screens -->
    <div id="home-screen" class="screen active-screen">
        <h3>Ҳамаи Комнатаҳо</h3>
        <div id="all-rooms-list"></div>
    </div>

    <div id="profile-screen" class="screen">
        <h3>Профили ман</h3>
        <div id="my-profile-info"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('home-screen', this)">Главни</button>
        <button class="nav-item" onclick="switchScreen('profile-screen', this)">Профил</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

<script>
    // Танзимоти Firebase (аз коди шумо)
    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com",
        projectId: "live-chat-ea070",
        storageBucket: "live-chat-ea070.firebasestorage.app",
        messagingSenderId: "321161064947",
        appId: "1:321161064947:web:53603c0e1be0b3baf66286"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Танзимоти Agora
    const AGORA_APP_ID = "cc17f089d7e14ab1aef4b7af69340077";
    let agoraClient = AgoraRTC.createClient({ mode: "live", codec: "vp8" });

    // Функсияҳои асосӣ барои пайвастшавӣ ва назорат
    function login() {
        // ... логикаи воридшавии шумо
        document.getElementById('auth-screen').style.display = 'none';
    }

    function switchScreen(screenId, element) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    function exitAndClearActiveChat() {
        document.getElementById('chat-window').style.display = 'none';
        // Қатъи Agora ҳангоми баромадан аз чат
        agoraClient.leave();
        document.getElementById('agora-video-view').style.display = 'none';
    }

    // Иловаи Agora ба чат
    async function joinAgoraChannel(channelName) {
        await agoraClient.join(AGORA_APP_ID, channelName, null, null);
        document.getElementById('agora-video-view').style.display = 'block';
        // Инҷо метавонед мантиқи иловагии камера/микрофонро пайваст кунед
    }
</script>
</body>
</html>
