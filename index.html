    <style>

    let currentContactsTab = "contacts"; let activeChatHeaderListener = null; let activeTypingListener = null; let typingTimeout = null; let activeRoomLiveListener = null;

    let userData = { name: "", phone: "", password: "", img: defaultAvatar, city: "Нишон дода нашудааст" };

    function updateUserOnlineStatus() {
        if (userData && userData.phone) { database.ref('users/' + userData.phone).update({ lastActive: firebase.database.ServerValue.TIMESTAMP }); }
    }
    setInterval(updateUserOnlineStatus, 3000);

    function initNetworkChecker() {
        const netBar = document.getElementById('network-status-bar');
        function updateStatus() {
            if (navigator.onLine) {
                if (netBar.classList.contains('network-offline')) {
                    netBar.className = 'network-bar network-online';
                    netBar.innerHTML = '<span>📶 Пайвастшавӣ барқарор шуд! 🟢</span>';
                    netBar.style.display = 'flex';
                    setTimeout(() => { netBar.style.display = 'none'; }, 3000);
                } else { netBar.style.display = 'none'; }
            } else {
                netBar.className = 'network-bar network-offline';
                netBar.innerHTML = '<span>🔌 Пайвастшавии интернет канда шуд! Офлайн ❌</span>';
                netBar.style.display = 'flex';
            }
        }
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();
    }

    window.onload = function() {
        initNetworkChecker(); 
        let savedUser = localStorage.getItem('chat_user_data');
        if(savedUser) { userData = JSON.parse(savedUser); enterApp(); }
    }

    function autoGrow(element) { element.style.height = "40px"; element.style.height = (element.scrollHeight) + "px"; }
    function handleTyping() { if (!currentChatRoomId) return; let typingPath = `typing/${currentChatRoomId}/${userData.phone}`; database.ref(typingPath).set(true); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { database.ref(typingPath).remove(); }, 2000); }
    function togglePasswordVisibility(inputId, btn) { let input = document.getElementById(inputId); if (input.type === "password") { input.type = "text"; btn.innerText = "🙈"; } else { input.type = "password"; btn.innerText = "👁️"; } }
    
    function showFileMenu() {
        let menu = document.getElementById('file-menu');
        menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
    }

    function handleChatFileSelect(input, type) {
        if(input.files && input.files[0]) {
            let file = input.files[0];
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                sendSpecialChatMessage(e.target.result, type === 'img' ? 'file' : 'doc', file.name);
            }
        }
    }

    function compressImage(file, callback) {
        let reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            let img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                let canvas = document.createElement('canvas');
                let MAX_WIDTH = 400; let MAX_HEIGHT = 400;
                let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                canvas.width = width; canvas.height = height;
                let ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL("image/jpeg", 0.4));
            }
        }
    }

    function login() {
        let name = document.getElementById('username').value.trim();
        let countryCode = document.getElementById('phone-country-code').value;
        let localPhone = document.getElementById('userphone').value.trim().replace(/[\s\-\+\(\)]/g, '');
        let city = "Нишон дода нашудааст";
        let pass = document.getElementById('userpass').value.trim();
         
        if(!name || !localPhone || pass.length === 0 || pass === "") { showSmartAlert("Лутфан ном, рақам ва рамзи махфиро нависед!"); return; }
        if(pass.length < 4) { showSmartAlert("Рамз бояд ҳадди ақал аз 4 аломат иборат бошад!"); return; }
        let phone = countryCode + localPhone;

        database.ref('users/' + phone).once('value', (snapshot) => {
            let serverUser = snapshot.val();
            if(serverUser) {
                if(serverUser.password === pass) {
                    userData = serverUser; localStorage.setItem('chat_user_data', JSON.stringify(userData)); enterApp();
                } else { showSmartAlert("Рамзи воридкардаи шумо нодуруст аст!"); }
            } else {
                userData = { name: name, phone: phone, password: pass, img: defaultAvatar, city: city };
                database.ref('users/' + phone).set(userData).then(() => { localStorage.setItem('chat_user_data', JSON.stringify(userData)); enterApp(); });
            }
        });
    }

    function enterApp() {
        updateProfileUI(); updateUserOnlineStatus(); monitorAccountSecurity(); listenForIncomingCalls();
        let homeBtn = document.querySelector('.nav-item[onclick*="home-screen"]');
        switchScreen('home-screen', homeBtn);
        document.getElementById('auth-screen').style.display = 'none';
        loadRoomsFromServer(); listenToUnreadMessages(); listenPrivateMessagesLiveGlobal(); listenToRoomSubscriptions();
    }

    async function exitAndClearActiveChat() {
        await leaveWherebyRoom(); 
        
        let room = roomsData.find(r => r.id === currentChatRoomId);
        if (room && room.creatorPhone === userData.phone && room.liveChannel) {
            stopRoomLive(currentChatRoomId); 
        }

        document.getElementById('chat-window').style.display = 'none';
        
        if (currentChatRoomId) {
            database.ref(`typing/${currentChatRoomId}/${userData.phone}`).remove();
            let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
            database.ref(dbPath).off();
        }
        if (activeRoomLiveListener) { activeRoomLiveListener.off(); activeRoomLiveListener = null; }
        currentChatRoomId = "";

        if (currentChatType === 'pm') {
            let pmBtn = document.querySelector('.nav-item[onclick*="openContactsScreen"]');
            openContactsScreen(pmBtn);
        } else {
            let homeBtn = document.querySelector('.nav-item[onclick*="home-screen"]');
            switchScreen('home-screen', homeBtn);
        }
    }

    function togglePmRowDotsMenu(event, chatId) {
        event.stopPropagation();
        let dropdowns = document.querySelectorAll('.pm-context-dropdown');
        let targetDrop = document.getElementById(`pm-drop-${chatId}`);
        let isCurrentlyOpen = targetDrop.style.display === 'block';
        dropdowns.forEach(d => d.style.display = 'none'); 
        if (!isCurrentlyOpen) targetDrop.style.display = 'block'; 
    }

    function playAudioMsg(btn, audioSrc) {
        if (currentPlayingAudioObj) {
            currentPlayingAudioObj.pause();
            document.querySelectorAll('.audio-play-btn').forEach(b => b.innerText = "▶️");
        }
        let audio = new Audio(audioSrc);
        currentPlayingAudioObj = audio;
        let timeline = btn.nextElementSibling.querySelector('.audio-progress');
        btn.innerText = "⏸️";
        audio.play();
        audio.ontimeupdate = () => { timeline.style.width = (audio.currentTime / audio.duration) * 100 + "%"; };
        audio.onended = () => { btn.innerText = "▶️"; timeline.style.width = "0%"; currentPlayingAudioObj = null; };
    }

    function deleteMyMsg(msgId) {
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        database.ref(dbPath + '/' + msgId).remove();
    }

    function replyToMsg(user, text) {
        let input = document.getElementById('message-input');
        input.value = `[Ҷавоб ба ${user}: ${text.substring(0, 20)}...] \n` + input.value;
        input.focus();
    }

    function sendMessage() {
        let input = document.getElementById('message-input');
        if(!input) return; 
        let text = input.value.trim();
        if(!text || !currentChatRoomId) return;

        if (currentChatType === 'room') {
            let room = roomsData.find(r => r.id === currentChatRoomId);
            if (room && room.onlyAdminCanWrite && room.creatorPhone !== userData.phone) {
                showSmartAlert("Дар ин комната танҳо админ метавонад нависад.");
                return;
            }
        }

        if (currentChatType === 'pm') {
            database.ref('private_status/' + currentChatRoomId).once('value', snapshot => {
                let statusInfo = snapshot.val() || {};
                let parts = currentChatRoomId.split('_');
                let otherPhone = parts[0] === userData.phone ? parts[1] : parts[0];
                let isBlockedByMe = statusInfo.blockedUsers ? !!statusInfo.blockedUsers[userData.phone] : false;
                let isBlockedByOther = statusInfo.blockedUsers ? !!statusInfo.blockedUsers[otherPhone] : false;

                if (isBlockedByMe || isBlockedByOther) { showSmartAlert("Ирсоли паём ғайриимкон аст!"); return; }
                executeMessageSend(text, input);
            });
        } else { executeMessageSend(text, input); }
    }

    function executeMessageSend(text, input) {
        if(input) { input.value = ""; if(input.style) input.style.height = "40px"; }
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        let msgRef = database.ref(dbPath).push();
        
        let msgData = {
            id: msgRef.key, phone: userData.phone, username: userData.name, userImg: userData.img,
            city: userData.city || "", text: text, msgType: 'text', timestamp: firebase.database.ServerValue.TIMESTAMP, seenBy: {}
        };
        msgData.seenBy[userData.phone] = true;

        msgRef.set(msgData).then(() => {
            database.ref(`typing/${currentChatRoomId}/${userData.phone}`).remove();
            if(currentChatType === 'pm') {
                database.ref('private_status/' + currentChatRoomId).update({ exists: true, lastMsgText: text, lastSender: userData.phone, read: false, timestamp: firebase.database.ServerValue.TIMESTAMP });
            }
        });
    }

    function tryEnterRoom(roomId) {
        let room = roomsData.find(r => r.id === roomId);
        if(room) {
            if (roomBellAlerts[roomId]) { roomBellAlerts[roomId] = false; subscribeAlertSound.pause(); renderRoomsUI(); }
            if(room.pass) {
                showSmartPrompt(`Ин комната қулф аст 🔒. Рамзро ворид кунед:`, "", function(userPass) {
                    if(userPass === room.pass) { openChat(room.name, room.img, room.id, 'room'); } 
                    else if(userPass !== null) { showSmartAlert("Рамз нодуруст аст!"); }
                });
            } else { openChat(room.name, room.img, room.id, 'room'); }
        }
    }

    function listenToUnreadMessages() {
        database.ref('messages').on('value', (snapshot) => {
            let allMessages = snapshot.val(); activeChats = []; let totalUnreadCount = 0;
            if (allMessages) {
                Object.keys(allMessages).forEach(roomId => {
                    let room = roomsData.find(r => r.id === roomId);
                    if (room && room.creatorPhone === userData.phone) {
                        let messagesArray = Object.values(allMessages[roomId]);
                        let unreadForThisRoom = 0;
                        messagesArray.forEach(m => { if (m.phone !== userData.phone && (!m.seenBy || !m.seenBy[userData.phone])) { unreadForThisRoom++; } });
                        if (currentChatRoomId === roomId && currentChatType === 'room') { unreadForThisRoom = 0; }
                        totalUnreadCount += unreadForThisRoom;
                        messagesArray.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                        let lastMsg = messagesArray[messagesArray.length - 1];
                        if (lastMsg) {
                            let isMyOwnMessage = (lastMsg.phone === userData.phone);
                            let isUserInsideThisChat = (roomId === currentChatRoomId && currentChatType === 'room');
                            let isRecentMessage = (Date.now() - (lastMsg.timestamp || 0) < 2500);
                            if (!isMyOwnMessage && !isUserInsideThisChat && isRecentMessage) { msgSound.currentTime = 0; msgSound.play().catch(err => console.log(err)); }
                        }
                        activeChats.push({ roomId: roomId, roomName: room.name, roomImg: room.img, lastMessageText: lastMsg ? (lastMsg.msgType === 'voice' ? '🎤 Овозӣ' : lastMsg.msgType === 'file' ? '📎 Файл/Расм' : lastMsg.text) : "Паёме нест", lastMessageUser: lastMsg ? lastMsg.username : "", timestamp: lastMsg ? (lastMsg.timestamp || 0) : 0, unreadCount: unreadForThisRoom });
                    } else if (room && subscribedRoomIds.includes(roomId)) {
                        let messagesArray = Object.values(allMessages[roomId]);
                        messagesArray.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                        let lastMsg = messagesArray[messagesArray.length - 1];
                        if (lastMsg && lastMsg.phone !== userData.phone && (lastMsg.timestamp || 0) > roomAlertBaselineTimestamp) {
                            let isUserInsideThisRoom = (roomId === currentChatRoomId && currentChatType === 'room');
                            if (!isUserInsideThisRoom) {
                                if (!roomBellAlerts[roomId]) { subscribeAlertSound.currentTime = 0; subscribeAlertSound.play().catch(e => console.log(e)); setTimeout(() => { subscribeAlertSound.pause(); }, 3000); }
                                roomBellAlerts[roomId] = true;
                            }
                        }
                    }
                });
            }
            let navBadge = document.getElementById('rooms-unread-badge');
            if (navBadge) { if (totalUnreadCount > 0) { navBadge.innerText = totalUnreadCount; navBadge.style.display = "block"; } else { navBadge.style.display = "none"; } }
            activeChats.sort((a, b) => b.timestamp - a.timestamp); renderActiveChats(); renderRoomsUI();
        });
    }

    async function joinRoomLiveAsViewerIfActive(roomId) {
        let room = roomsData.find(r => r.id === roomId);
        if (activeRoomLiveListener) { activeRoomLiveListener.off(); activeRoomLiveListener = null; }
        activeRoomLiveListener = database.ref('rooms/' + roomId + '/liveChannel');
        activeRoomLiveListener.on('value', async (snap) => {
            let roomUrl = snap.val();
            if (roomUrl && !isViewerInLiveRoom && room && room.creatorPhone !== userData.phone) {
                try {
                    await leaveWherebyRoom();
                    openWherebyEmbed(roomUrl, { audioOnly: true, viewerMode: true });
                    isViewerInLiveRoom = true;
                } catch (err) { console.error("Хатогии пайвастшавии тамошобин ба эфир:", err); }
            } else if (!roomUrl && isViewerInLiveRoom) { await leaveWherebyRoom(); }
        });
    }

    function openChat(name, img, roomId, type = 'room') {
        currentChatRoomId = roomId; currentChatType = type;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        let messagesList = document.getElementById('chat-messages-list'); messagesList.innerHTML = ""; 
        let headerActions = document.getElementById('chat-header-settings-zone');
        let statusSubtitle = document.getElementById('chat-user-status-subtitle'); statusSubtitle.innerText = ""; 

        if (activeChatHeaderListener) { activeChatHeaderListener.off(); activeChatHeaderListener = null; }
        if (activeTypingListener) { activeTypingListener.off(); activeTypingListener = null; }
        if (activeRoomLiveListener) { activeRoomLiveListener.off(); activeRoomLiveListener = null; }

        let parts = roomId.split('_'); let otherPhone = parts[0] === userData.phone ? parts[1] : parts[0];

        if(type === 'pm') {
            headerActions.innerHTML = `<button class="call-btn" onclick="startVoiceCall('${roomId}')" title="Занг задан">📞</button><button class="call-btn" onclick="startVideoCall('${roomId}')" title="Видеовизов">📹</button><button class="chat-header-btn" onclick="toggleChatHeaderSettingsDropdown(event)">⚙️</button><div class="chat-header-dropdown" id="chat-header-dropdown-menu"><button id="chat-dropdown-block-btn" onclick="handleBlockFromChatHeader('${roomId}')">Блок кардан</button></div>`;
            activeChatHeaderListener = database.ref('users/' + otherPhone);
            activeChatHeaderListener.on('value', snap => {
                if (snap.exists()) {
                    let otherUser = snap.val(); let isOnline = false;
                    if(otherUser.lastActive) { let diff = Date.now() - otherUser.lastActive; if(diff < 12000) isOnline = true; }
                    statusSubtitle.innerHTML = isOnline ? `<span style="color:#10b981; font-weight:bold;">в сети 🟢</span>` : "не в сети";
                }
            });
        } else {
            headerActions.innerHTML = "";
            database.ref('room_subscribers/' + roomId).once('value', snap => {
                let count = snap.exists() ? Object.keys(snap.val()).length : 0;
                statusSubtitle.innerHTML = `👥 Обуначиён: ${count}`;
            });
            joinRoomLiveAsViewerIfActive(roomId);
        }

        let dbPath = currentChatType === 'room' ? 'messages/' + roomId : 'private_messages/' + roomId;
        database.ref(dbPath).on('value', (snapshot) => {
            if(currentChatRoomId !== roomId) return; 
            let messages = snapshot.val(); let messagesHTML = ""; let lastDateStr = "";
            if(messages) {
                let messagesArray = Object.values(messages);
                messagesArray.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                messagesArray.forEach(m => {
                    let msgDateStr = formatDateDivider(m.timestamp);
                    if(msgDateStr !== lastDateStr) { messagesHTML += `<div class="date-divider"><span>${msgDateStr}</span></div>`; lastDateStr = msgDateStr; }
                    let isMe = m.phone === userData.phone; let wrapperClass = isMe ? "me" : "other";

                    if(currentChatType === 'room' && !isMe && (!m.seenBy || !m.seenBy[userData.phone])) { database.ref(`messages/${roomId}/${m.id}/seenBy/${userData.phone}`).set(true); } 
                    else if (currentChatType === 'pm' && !isMe && (!m.seenBy || !m.seenBy[userData.phone])) { database.ref(`private_messages/${roomId}/${m.id}/seenBy/${userData.phone}`).set(true); }

                    let ticksHTML = isMe ? buildTicksHTML(m) : ""; let cityLabel = m.city ? ` (${m.city})` : "";
                    let bubbleContentHTML = `<div class="msg-text">${linkify(m.text)}</div>`; 

                    if (m.msgType === 'voice') {
                        bubbleContentHTML = `<div class="audio-player"><button class="audio-play-btn" onclick="playAudioMsg(this, '${m.fileData}')">▶️</button><div class="audio-timeline"><div class="audio-progress"></div></div></div>`;
                    } else if (m.msgType === 'file' || m.msgType === 'doc') {
                        if (m.fileData && m.fileData.startsWith('data:image/')) {
                            bubbleContentHTML = `<img src="${m.fileData}" style="max-width:120px; max-height:120px; border-radius:8px; cursor:pointer;" onclick="openImageModal('${m.fileData}')">`;
                        } else {
                            bubbleContentHTML = `<a href="${m.fileData}" download="${m.fileName}" style="color:inherit; text-decoration:underline;">📁 ${m.fileName || 'Файл'}</a>`;
                        }
                    }

                    let replyBtn = `<button onclick="replyToMsg('${m.username}', '${m.text}')" style="font-size:10px; background:none; border:none; cursor:pointer; color: ${isMe ? 'white' : 'gray'};">↩️ Ҷавоб</button>`;
                    let deleteBtn = isMe ? `<button onclick="deleteMyMsg('${m.id}')" style="font-size:10px; color:red; background:none; border:none; cursor:pointer;">🗑️</button>` : "";
                    bubbleContentHTML += `<div style="display:flex; justify-content:flex-end; gap:5px; margin-top:5px;">${replyBtn} ${deleteBtn}</div>`;

                    messagesHTML += `<div class="msg-wrapper ${wrapperClass}"><img src="${m.userImg || defaultAvatar}" class="msg-avatar"><div class="msg-body"><span class="msg-username">${m.username}${cityLabel}</span><div class="msg-bubble">${bubbleContentHTML}<div class="msg-footer"><span>${formatTime(m.timestamp)}</span>${ticksHTML}</div></div></div></div>`;
                });
            }
            messagesList.innerHTML = messagesHTML; messagesList.scrollTop = messagesList.scrollHeight; 
        });
    }

    // Қисмҳои дигари код бетағйир мемонанд (намоиш додани toast, formatTime, openWherebyEmbed ва ғайра)
</script>

</body>
