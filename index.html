<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <title>Системаи Бақайдгирӣ</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .box { width: 350px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        .phone-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="auth-box" class="box" style="display:none;">
    <h2>Бақайдгирӣ</h2>
    <input type="text" id="fullname" placeholder="Ному насаб">
    <div class="phone-group">
        <input type="text" id="cityCode" placeholder="+992" style="width: 30%;">
        <input type="text" id="phone" placeholder="Рақами телефон" style="width: 70%;">
    </div>
    <input type="password" id="password" placeholder="Парол">
    <button onclick="registerUser()">Сабти ном шудан</button>
</div>

<div id="main-box" class="box" style="display:none; text-align: center;">
    <h1>Хуш омадед!</h1>
    <p>Шумо ба система ворид шудед.</p>
    <button onclick="logout()" style="background-color: #dc3545;">Баромадан</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com",
        projectId: "live-chat-ea070",
        storageBucket: "live-chat-ea070.firebasestorage.app",
        messagingSenderId: "321161064947",
        appId: "1:321161064947:web:53603c0e1be0b3baf66286"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // МАНТИҚИ АСОСӢ:
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Агар корбар пешина бошад (аллакай сабт шуда бошад)
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-box').style.display = 'block';
        } else {
            // Агар корбар нав бошад
            document.getElementById('auth-box').style.display = 'block';
            document.getElementById('main-box').style.display = 'none';
        }
    });

    // Сабти номи корбари нав
    window.registerUser = async () => {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const fullname = document.getElementById('fullname').value;
        const cityCode = document.getElementById('cityCode').value;

        const email = phone.replace(/\s+/g, '') + "@user.app";

        try {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await set(ref(db, 'users/' + cred.user.uid), {
                fullname, 
                fullPhone: cityCode + phone
            });
            alert("Шумо ба қайд гирифта шудед!");
            // Баъд аз сабти ном худкор ба равзанаи асосӣ мегузарад
        } catch (err) {
            alert("Хатогӣ: " + err.message);
        }
    };

    window.logout = () => {
        signOut(auth).then(() => location.reload());
    };
</script>
</body>
</html>
