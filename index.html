<!DOCTYPE html>
<html lang="tg" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат бо функсияи Невидимка ва Лички (Agora)</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #f5f7fb; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            transition: background-color 0.3s;
        }

        body, button, .nav-item, .item-card, .chat-header, .online-status-badge, .profile-ctrl-btn, .pm-user-row, .msg-username, .msg-footer {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none; 
        }

        input, textarea, .msg-text, .toast-input {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        img {
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .phone-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100vh; 
            height: 100dvh; 
            background: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            overflow: hidden; 
            transition: background 0.3s;
        }
        
        .screen { 
            display: none; 
            flex-direction: column; 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background: #f8fafc; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
            -ms-overflow-style: none;  
            transition: background 0.3s;
        }
        .screen::-webkit-scrollbar { display: none; } 

        .active-screen { display: flex; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
         
        #home-screen { display: none; flex-direction: column; height: 100%; overflow: hidden; padding-bottom: 0; background: #f8fafc; }
        #home-screen.active-screen { display: flex; }
        
        #all-rooms-list { 
            flex: 1; 
            overflow-y: auto; 
            scrollbar-width: none; 
            padding-bottom: 20px; 
            background: transparent; 
            border-bottom-left-radius: 30px; 
            border-bottom-right-radius: 30px; 
        }
        #all-rooms-list::-webkit-scrollbar { display: none; }

        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; z-index: 100; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: absolute; width: 100%; padding: 20px; }
        .auth-form { width: 100%; max-width: 350px; background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }

        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 50; display: none; flex-direction: column; overflow: hidden; }
        
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        
        .chat-header-left { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding-right: 5px; }
        .chat-header-actions { position: relative; display: flex; align-items: center; gap: 8px; }
        .chat-header-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px; }
        .chat-header-dropdown { display: none; position: absolute; top: 35px; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 250; width: 160px; overflow: hidden; }
        .chat-header-dropdown button { width: 100%; padding: 12px 16px; border: none; background: none; text-align: left; font-size: 14px; font-weight: 500; color: #334155; cursor: pointer; }
        .chat-header-dropdown button:hover { background: #f1f5f9; }
         
        .chat-messages { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }
         
        .date-divider { text-align: center; margin: 10px 0; display: flex; align-items: center; justify-content: center; width: 100%; }
        .date-divider span { background: rgba(0, 0, 0, 0.06); color: #666; padding: 4px 14px; border-radius: 12px; font-size: 11px; font-weight: 500; }

        .msg-wrapper { display: flex; gap: 8px; width: 100%; max-width: 80%; margin-bottom: 2px; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.other { align-self: flex-start; flex-direction: row; }
         
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #e2e8f0; flex-shrink: 0; }
         
        .msg-body { display: flex; flex-direction: column; max-width: calc(100% - 40px); position: relative; }
        .msg-wrapper.me .msg-body { align-items: flex-end; }
        .msg-wrapper.other .msg-body { align-items: flex-start; }
         
        .msg-username { font-size: 11px; color: #718096; font-weight: 600; margin-bottom: 2px; padding: 0 4px; }
         
        .msg-bubble { position: relative; border-radius: 16px; padding: 10px 14px; padding-bottom: 24px; min-width: 90px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .msg-wrapper.me .msg-bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; padding-top: 22px; } 
        .msg-wrapper.other .msg-bubble { background: white; color: #333; border-bottom-left-radius: 4px; }
         
        .msg-text { font-size: 15px; word-break: break-word; overflow-wrap: break-word; line-height: 20px; }

        .msg-footer { position: absolute; bottom: 4px; right: 10px; display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .msg-wrapper.me .msg-footer { color: rgba(255, 255, 255, 0.75); }
        .msg-wrapper.other .msg-footer { color: #a0aec0; }

        .msg-ticks {
            display: inline-flex;
            align-items: center;
            margin-left: 2px;
            position: relative;
            height: 14px;
        }
        .tick {
            display: inline-block;
            width: 10px;
            height: 14px;
            position: relative;
        }
        .tick::after {
            content: '';
            display: block;
            width: 5px;
            height: 9px;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(40deg) skewX(-5deg);
            position: absolute;
            top: 1px;
            left: 1px;
        }
        .tick-double { display: inline-flex; align-items: center; }
        .tick-double .tick:nth-child(2) { margin-left: -5px; }
        .ticks-sent { color: rgba(255,255,255,0.7); }
        .ticks-delivered { color: rgba(255,255,255,0.7); }
        .ticks-read .tick { color: #a8d5f7; }

        .badge { background: #ff3b30; color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: bold; display: inline-block; min-width: 18px; text-align: center; }
        .nav-item { position: relative; }
        .nav-badge { position: absolute; top: 4px; right: 22%; background: #ff3b30; color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: bold; min-width: 16px; text-align: center; display: none; }

        .chat-input-area { padding: 10px; background: white; display: flex; gap: 8px; border-top: 1px solid #edf2f7; align-items: flex-end; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        #message-input { flex: 1; width: 0; height: 40px; max-height: 100px; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 18px; font-size: 15px; background: #f8fafc; outline: none; resize: none; overflow-y: auto; line-height: 20px; }
        .chat-blocked-notice { width: 100%; text-align: center; padding: 12px; font-size: 14px; color: #718096; background: #edf2f7; border-radius: 12px; font-weight: 500; }

        input[type="text"], input[type="tel"], input[type="password"], select { width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; background: #f8fafc; outline: none; -webkit-appearance: none; }
        input:focus, #message-input:focus, select:focus { border-color: #667eea; background: #fff; }
         
        .password-container { position: relative; width: 100%; }
        .password-container input { padding-right: 45px; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #718096; outline: none; }

        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; margin-top: 8px; }
        .btn-danger { background: linear-gradient(135deg, #f56565 0%, #c53030 100%); color: white; margin-top: 8px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; width: auto; display: inline-block; margin-top: 10px; }

        .create-room-box, .edit-profile-box { display: none; background: white; padding: 15px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-top: 10px; animation: slideDown 0.2s ease-in-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card { 
            background: #ffffff; 
            padding: 16px; 
            margin-bottom: 14px; 
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom-left-radius: 35px; 
            border-bottom-right-radius: 35px; 
            border: 1px solid rgba(102, 126, 234, 0.12);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.05), 0 1px 3px rgba(0, 0, 0, 0.01); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .item-card:hover, .item-card:active { 
            transform: translateY(-3px) scale(1.01); 
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.12); 
            border-color: rgba(102, 126, 234, 0.3);
            background: linear-gradient(145deg, #ffffff, #fcfdfe);
        }
        .card-main-info { display: flex; align-items: center; width: 100%; justify-content: space-between; }
        .card-info { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
         
        .room-avatar, .user-avatar { 
            width: 48px; 
            height: 48px; 
            border-radius: 16px; 
            background: #f1f5f9; 
            object-fit: cover; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border: 2px solid #ffffff;
            flex-shrink: 0;
        }
        
        .profile-avatar-big { 
            width: 68px; 
            height: 68px; 
            border-radius: 18px;      
            background: #e2e8f0; 
            object-fit: cover; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
            border: 2px solid white; 
            transform: rotate(0deg);  
        }
        .lock-icon { 
            font-size: 15px; 
            margin-left: auto; 
            background: #f8fafc; 
            padding: 6px 10px; 
            border-radius: 12px; 
            color: #64748b;
            border: 1px solid #edf2f7;
        }

        .manage-btn { 
            background: #f8fafc; 
            color: #6366f1; 
            border: 1px solid #e0e7ff; 
            border-radius: 12px; 
            padding: 10px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            margin-top: 4px; 
            transition: all 0.2s; 
        }
        .manage-btn:hover { background: #eef2ff; border-color: #c7d2fe; }

        .manage-menu { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; margin-top: 5px; animation: fadeIn 0.2s ease; }
        .menu-item { width: 100%; text-align: left; padding: 8px 12px; border: none; background: none; font-size: 13px; font-weight: 500; color: #334155; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
        .menu-item:hover { background: #e2e8f0; }
        .menu-item.danger { color: #dc2626; }
        .menu-item.danger:hover { background: #fee2e2; }

        .bottom-nav { 
            height: calc(65px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #edf2f7; 
            border-top-left-radius: 25px; 
            border-top-right-radius: 25px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #f8fafc; 
            flex-shrink: 0; 
            width: 100%; 
            padding-bottom: env(safe-area-inset-bottom); 
            box-shadow: none; 
        }
        .nav-item { border: none; background: none; font-size: 12px; color: #a0aec0; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; cursor: pointer; height: 100%; justify-content: center; transition: color 0.2s; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; transition: transform 0.2s; }
        .nav-item.active { color: #667eea; font-weight: 600; }
        .nav-item.active svg { transform: scale(1.05); }
         
        .user-profile-box { 
            background: linear-gradient(135deg, #eef2f7 0%, #dde5ed 100%); 
            padding: 20px; 
            border-radius: 30px 15px 45px 15px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            position: relative; 
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.08), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        
        .profile-top-controls { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .profile-ctrl-btn { background: #ffffff; border: 1px solid #e2e8f0; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all 0.2s; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .profile-ctrl-btn:hover { background: #f1f5f9; transform: scale(1.05); }
        
        .profile-settings-dropdown { display: none; position: absolute; top: 40px; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 200; width: 160px; overflow: hidden; animation: slideDown 0.15s ease-in-out; }
        .profile-settings-dropdown button { width: 100%; padding: 10px 14px; border: none; background: none; text-align: left; font-size: 13px; font-weight: 500; color: #334155; cursor: pointer; }
        .profile-settings-dropdown button:hover { background: #f1f5f9; }
        .profile-settings-dropdown button.logout-item { color: #dc2626; border-top: 1px solid #f1f5f9; }

        .pm-badge-counter { position: absolute; top: -3px; right: -3px; background: #ff3b30; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; font-weight: bold; display: none; align-items: center; justify-content: center; border: 1px solid white; }

        .searched-user-box { display: flex; align-items: center; gap: 12px; background: #e0e7ff; padding: 12px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
        hr { border: 0; height: 1px; background: #e2e8f0; margin: 20px 0; }

        .toast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; backdrop-filter: blur(3px); }
        .toast-box { background: white; width: 100%; max-width: 340px; border-radius: 20px; padding: 22px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); animation: toastPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes toastPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .toast-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #1e293b; }
        .toast-msg { font-size: 15px; color: #475569; line-height: 22px; margin-bottom: 20px; word-break: break-word; }
        .toast-buttons { display: flex; gap: 10px; justify-content: center; }
        .toast-btn { flex: 1; padding: 11px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .toast-btn-ok { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .toast-btn-cancel { background: #f1f5f9; color: #64748b; }
        .toast-input { width: 100%; padding: 11px 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; margin-bottom: 15px; outline: none; }
        .toast-input:focus { border-color: #667eea; }

        #search-input { position: sticky; top: 0; z-index: 10; background-color: #f8fafc; margin-top: 0; margin-bottom: 10px; padding-top: 20px; }
        #search-user-result { position: sticky; top: 60px; z-index: 9; background-color: #f8fafc; }
        .rooms-title-container { position: sticky; top: 60px; z-index: 8; background: #f8fafc; margin: 0 0 12px 0; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        #search-user-result:not(:empty) + .rooms-title-container { top: 140px; }
        .rooms-title-container h3 { font-size: 16px; color: #4a5568; font-weight: 600; }

        #my-rooms-list {
            display: flex;
            flex-direction: row;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none; 
            -ms-overflow-style: none;  
            padding: 10px 30px; 
            width: 100%;
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch;
            align-items: flex-start; 
        }
        #my-rooms-list::-webkit-scrollbar { display: none; } 
         
        #my-rooms-list .item-card {
            flex-shrink: 0;
            width: calc(100% - 10px); 
            max-width: 360px;
            margin-bottom: 0;
            scroll-snap-align: center; 
        }

        .profile-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 30px 15px 45px 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .profile-header-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .add-profile-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.25);
            transition: transform 0.2s;
        }
        .contacts-profile-btn {
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(52, 211, 153, 0.25);
            transition: transform 0.2s;
        }
        .pms-profile-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(99, 102, 241, 0.25);
            position: relative;
            transition: transform 0.2s;
        }
        .add-profile-btn:active, .contacts-profile-btn:active, .pms-profile-btn:active { transform: scale(0.9); }

        .pms-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff3b30;
            color: white;
            border-radius: 10px;
            padding: 1px 5px;
            font-size: 10px;
            font-weight: bold;
            min-width: 16px;
            text-align: center;
            display: none;
            box-shadow: 0 0 0 2px #ffffff;
        }
        body.dark-mode .pms-badge { box-shadow: 0 0 0 2px #334155; }

        .room-unread-badge {
            background: #ff3b30;
            color: white;
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 11px;
            font-weight: bold;
            min-width: 16px;
            text-align: center;
            margin-right: 6px;
            display: inline-block;
        }
        
        .profile-context-menu {
            display: none;
            position: absolute;
            top: 45px;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            z-index: 150;
            width: 180px;
            overflow: hidden;
            animation: slideDown 0.15s ease-in-out;
        }
        .profile-context-menu button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: none;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .profile-context-menu button:hover { background: #f1f5f9; }
        
        #private-chats-screen {
            padding: 0;
            overflow: hidden; 
            display: none; 
            flex-direction: column;

    function compressImage(file, callback) {
        let reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            let img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                let canvas = document.createElement('canvas');
                let MAX_WIDTH = 120;
                let MAX_HEIGHT = 120;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }
                canvas.width = width;
                canvas.height = height;
                let ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL("image/jpeg", 0.7));
            }
        }
    }

        let phone = countryCode + localPhone;

        database.ref('users/' + phone).once('value', (snapshot) => {
            let serverUser = snapshot.val();
            if(serverUser) {
                if(serverUser.password === pass) {

                    showSmartAlert("Ин рақами телефон аллакай сабт шудааст ва рамзи воридкардаи шумо нодуруст аст!");
                }
            } else {

                database.ref('users/' + phone).set(userData).then(() => {
                    localStorage.setItem('chat_user_data', JSON.stringify(userData));
                    enterApp();
                });
            }
        });
    }

    function renderRoomsUI() {
        let myRoomsHTML = ""; 
        let allRoomsHTML = "";

        roomsData.forEach(room => {
            if(filterByCreatorPhone && room.creatorPhone !== filterByCreatorPhone) return;
            let lockIcon = room.pass ? "🔒" : "🔓";

            if (!room.isSecret || room.creatorPhone === userData.phone) {
                let hiddenBadge = room.isSecret ? " <span style='color:#6366f1; font-size:11px;'>[🕵️‍♂️ Невидимка]</span>" : "";
                allRoomsHTML += `
                    <div class="item-card" onclick="tryEnterRoom('${room.id}')">
                        <div class="card-main-info">

                            <div class="card-info" style="flex:1; margin-left:10px;">

                            </div>
                            <span class="lock-icon">${lockIcon}</span>
                        </div>
                    </div>`;
            }

            if(room.creatorPhone === userData.phone) {
                let secretText = room.isSecret ? "👁️ Намоён кардан дар главни" : "🕵️‍♂️ Танзими Невидимка";
                let adminWriteText = room.onlyAdminCanWrite ? "👥 Ба ҳама иҷозат додан" : "👤 Танҳо ман нависам";

                let roomChatInfo = activeChats.find(c => c.roomId === room.id);
                let roomUnreadCount = roomChatInfo ? roomChatInfo.unreadCount : 0;
                let roomUnreadBadgeHTML = roomUnreadCount > 0 ? `<span class="room-unread-badge">${roomUnreadCount}</span>` : "";

                myRoomsHTML += `
                    <div class="item-card" id="my-room-${room.id}">
                        <div class="card-main-info">
                            <img src="${room.img || defaultAvatar}" class="room-avatar" onclick="toggleManageMenu('${room.id}')">
                            <div class="card-info" style="flex:1; margin-left:10px;" onclick="toggleManageMenu('${room.id}')">
                                <b style="font-size:15px; color:#1e293b;">🏢 ${room.name} ${room.isSecret ? "🕵️‍♂️" : ""}</b>
                            </div>
                            ${roomUnreadBadgeHTML}
                            <button class="live-btn" onclick="startAgoraRoomLive('${room.id}', '${room.name}')">🎥 Эфир</button>
                            <span class="lock-icon" style="margin-left: 10px;">${lockIcon}</span>
                        </div>
                        
                        <button class="manage-btn" onclick="toggleManageMenu('${room.id}')">⚙️ Идоракунӣ</button>
                        
                        <div class="manage-menu" id="menu-${room.id}">
                            <button class="menu-item" onclick="tryEnterRoom('${room.id}')">🚪 Ворид шудан</button>
                            <button class="menu-item" onclick="editRoomInfo('${room.id}')">✏️ Татбиқ намудани тағйирот</button>
                            <button class="menu-item" onclick="clearRoomChat('${room.id}')">🧹 Пок кардани чат</button>
                            <button class="menu-item" onclick="toggleRoomSecret('${room.id}', ${!!room.isSecret})">${secretText}</button>
                            <button class="menu-item" onclick="toggleAdminWriteOnly('${room.id}', ${!!room.onlyAdminCanWrite})">${adminWriteText}</button>
                            <button class="menu-item" onclick="shareRoom('${room.id}')">🔗 Истиноди комната</button>
                            <button class="menu-item danger" onclick="deleteRoom('${room.id}')">🗑️ Нест кардани комната</button>
                        </div>
                    </div>`;
            }
        });

        const myRoomsList = document.getElementById('my-rooms-list');
        const allRoomsList = document.getElementById('all-rooms-list');
        
        if (myRoomsList) myRoomsList.innerHTML = myRoomsHTML || "<p style='color:gray; font-size:14px; padding: 10px;'>Комнатаҳои сохтаи шумо нест.</p>";
        if (allRoomsList) allRoomsList.innerHTML = allRoomsHTML || "<p style='color:gray; font-size:14px;'>Ҳеҷ комнатае мавҷуд нест.</p>";
    }

    // AGORA LIVE STREAMING (ЭФИР) БАРОИ КОМНАТА
    async function startAgoraRoomLive(roomId, roomName) {
        showSmartConfirm("Оё мехоҳед эфири ҳақиқиро бо Agora оғоз кунед? Истинод ба чат фиристода мешавад.", async function(yes) {
            if(yes) {
                let callRoomName = roomId + "_live_" + Math.floor(Math.random() * 10000);
                let dbPath = 'messages/' + roomId;
                let msgRef = database.ref(dbPath).push();
                let liveText = `📢 ОҒОЗИ ЭФИРИ НАВ АЗ AGORA! 🎥\nСоҳиби комната эфирро оғоз кард. Лоиҳа: ${callRoomName}`;
                
                let msgData = {
                    id: msgRef.key,
                    phone: userData.phone,
                    username: userData.name,
                    userImg: userData.img,
                    city: userData.city || "",
                    text: liveText,
                    msgType: 'text',
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    seenBy: {}
                };
                msgData.seenBy[userData.phone] = true;
                
                await msgRef.set(msgData);
                
                openChat(roomName, defaultAvatar, roomId, 'room');
                let videoView = document.getElementById('agora-video-view');
                videoView.style.display = 'block';
                
                await agoraClient.setClientRole("host");
                await agoraClient.join(AGORA_APP_ID, callRoomName, null, null);
                
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                
                localTracks.videoTrack.play('agora-video-view');
                await agoraClient.publish([localTracks.audioTrack, localTracks.videoTrack]);
                showSmartAlert("Эфири шумо фаъол шуд! Корбарон метавонанд садо ва видеои шуморо бубинанд.");
            }
        });
    }

    function addNewContactFromInput() {

                        addedAt: firebase.database.ServerValue.TIMESTAMP

    function loadOnlineUsersUI() {
        const container = document.getElementById('private-users-list-zone');
        container.innerHTML = "<p style='text-align:center; color:gray; padding:20px;'>Ҷустуҷӯи нафарони фаъол...</p>";

        database.ref(`users/${userData.phone}/contacts`).once('value', contactSnapshot => {
            if(!contactSnapshot.exists()) {
                container.innerHTML = "<p style='text-align:center; color:gray; padding:20px;'>Дар рӯйхати контактҳои шумо ҳеҷ кас онлайн нест.</p>";
                return;
            }

            let myContacts = contactSnapshot.val();

            database.ref('private_status').once('value', statusSnap => {
                let allStatus = statusSnap.val() || {};
                let blockedPhones = new Set();
                Object.keys(allStatus).forEach(key => {
                    if (key.includes(userData.phone)) {
                        let info = allStatus[key];
                        if (info.blockedUsers && info.blockedUsers[userData.phone]) {
                            let parts = key.split('_');
                            let other = parts[0] === userData.phone ? parts[1] : parts[0];
                            blockedPhones.add(other);
                        }
                    }
                });

                database.ref('users').once('value', snapshot => {
                    container.innerHTML = "";
                    let onlineCount = 0;

                    if(snapshot.exists()) {
                        snapshot.forEach(child => {
                            let user = child.val();
                            if(user.phone !== userData.phone && myContacts[user.phone] && !blockedPhones.has(user.phone)) {
                                let isOnline = false;
                                if(user.lastActive) {
                                    let diff = Date.now() - user.lastActive;
                                    if(diff < 12000) isOnline = true; 
                                }

                                if (isOnline) {
                                    onlineCount++;
                                    let contactName = myContacts[user.phone].name || user.name;
                                    let row = document.createElement('div');
                                    row.className = 'pm-user-row';
                                    row.onclick = () => initiatePrivateChat(user.phone, contactName);
                                    row.innerHTML = `
                                        <div class="pm-row-left">
                                            <img src="${user.img || defaultAvatar}" class="room-avatar">
                                            <div class="pm-meta-text">
                                                <div style="display:flex; align-items:center; gap:8px;">
                                                    <b>👤 ${contactName}</b>
                                                    <span class="online-status-badge">
                                                        <span class="online-dot-blinking"></span> в сети
                                                    </span>
                                                </div>
                                                <span class="city-tag">🏠 Шаҳр: ${user.city || 'Нишон дода нашудааст'}</span>
                                                <p style="color:#10b981;">📞 Рақам: ${user.phone}</p>
                                            </div>
                                        </div>
                                        <div class="pm-row-right">
                                            <span style="font-size:12px; background:#d1fae5; color:#065f46; padding:4px 10px; border-radius:12px; font-weight:600;">Навиштан</span>
                                        </div>`;
                                    container.appendChild(row);
                                }
                            }
                        });
                    }

                    if(onlineCount === 0) {
                        container.innerHTML = "<p style='text-align:center; color:gray; padding:20px;'>Дар айни замон аз рӯйхати контактҳоятон ягон кас онлайн нест.</p>";
                    }
                });
            });
        });
    }

    function formatTime(timestamp) {
        if(!timestamp) return "00:00";
        let date = new Date(timestamp);
        let hours = String(date.getHours()).padStart(2, '0');
        let minutes = String(date.getMinutes()).padStart(2, '0');
        return `${hours}:${minutes}`;
    }

    function formatDateDivider(timestamp) {
        if(!timestamp) return "Имрӯз";
        let date = new Date(timestamp);
        let today = new Date();
        if (date.toDateString() === today.toDateString()) return "Имрӯз";
        let months = ["Январ", "Феврал", "Март", "Апрел", "Май", "Июн", "Июл", "Август", "Сентябр", "Октябр", "Ноябр", "Декябр"];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function buildTicksHTML(msg) {
        let seenBy = msg.seenBy || {};
        let seenCount = Object.keys(seenBy).length;
        let othersRead = Object.keys(seenBy).some(phone => phone !== msg.phone);

        if (othersRead) {
            return `<span class="msg-ticks ticks-read tick-double"><span class="tick"></span><span class="tick"></span></span>`;
        } else if (seenCount >= 1) {
            return `<span class="msg-ticks ticks-delivered tick-double"><span class="tick"></span><span class="tick"></span></span>`;
        } else {
            return `<span class="msg-ticks ticks-sent"><span class="tick"></span></span>`;
        }
    }

    function listenToUnreadMessages() {
        database.ref('messages').on('value', (snapshot) => {
            let allMessages = snapshot.val();
            activeChats = [];
            let totalUnreadCount = 0;

            if (allMessages) {
                Object.keys(allMessages).forEach(roomId => {
                    let room = roomsData.find(r => r.id === roomId);
                    if (room && room.creatorPhone === userData.phone) {
                        let messagesArray = Object.values(allMessages[roomId]);
                        let unreadForThisRoom = 0;

                        messagesArray.forEach(m => {
                            if (m.phone !== userData.phone && (!m.seenBy || !m.seenBy[userData.phone])) {
                                unreadForThisRoom++;
                            }
                        });

                        if (currentChatRoomId === roomId && currentChatType === 'room') {
                            unreadForThisRoom = 0;
                        }

                        totalUnreadCount += unreadForThisRoom;
                        messagesArray.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                        let lastMsg = messagesArray[messagesArray.length - 1];

                        if (lastMsg) {
                            let isMyOwnMessage = (lastMsg.phone === userData.phone);
                            let isUserInsideThisChat = (roomId === currentChatRoomId && currentChatType === 'room');
                            let isRecentMessage = (Date.now() - (lastMsg.timestamp || 0) < 2500);

                            if (!isMyOwnMessage && !isUserInsideThisChat && isRecentMessage) {
                                msgSound.currentTime = 0;
                                msgSound.play().catch(err => console.log(err));
                            }
                        }

                        activeChats.push({
                            roomId: roomId,
                            roomName: room.name,
                            roomImg: room.img,
                            lastMessageText: lastMsg ? (lastMsg.msgType === 'voice' ? '🎤 Овозӣ' : lastMsg.msgType === 'file' ? '📎 Файл/Расм' : lastMsg.text) : "Паёме нест",
                            lastMessageUser: lastMsg ? lastMsg.username : "",
                            timestamp: lastMsg ? (lastMsg.timestamp || 0) : 0,
                            unreadCount: unreadForThisRoom
                        });
                    }
                });
            }

            let navBadge = document.getElementById('rooms-unread-badge');
            if (navBadge) {
                if (totalUnreadCount > 0) {
                    navBadge.innerText = totalUnreadCount;
                    navBadge.style.display = "block";
                } else {
                    navBadge.style.display = "none";
                }
            }

            activeChats.sort((a, b) => b.timestamp - a.timestamp);
            renderActiveChats();
            renderRoomsUI();
        });
    }

    function renderActiveChats() {
        let activeListHTML = "";
        let visibleChatsCount = 0;

            let badgeHTML = chat.unreadCount > 0 ? `<span class="badge" style="margin-left:auto;">${chat.unreadCount}</span>` : "";

                <div class="item-card" onclick="tryEnterRoom('${chat.roomId}')" style="padding: 10px 16px;">

                            <b style="font-size:15px; color:#1e293b;">🏢 ${chat.roomName}</b> 
                            <span style="font-size:13px; color:#64748b; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">

    let lastPlayedSoundTimestamp = 0;

    function listenPrivateMessagesLiveGlobal() {
        database.ref('private_status').on('value', snapshot => {
            let totalUnreadPM = 0;
            let statusData = snapshot.val();
            let currentTime = Date.now();

            if(statusData) {
                Object.keys(statusData).forEach(chatId => {
                    if(chatId.includes(userData.phone)) {
                        let info = statusData[chatId];
                        if(info.lastSender !== userData.phone && !info.read) {
                            totalUnreadPM++;
                            let msgTime = info.timestamp || 0;
                            let isRecentPM = (currentTime - msgTime < 5000); 
                            let isUserInsideThisPM = (chatId === currentChatRoomId && currentChatType === 'pm');

                            if (isRecentPM && !isUserInsideThisPM && msgTime > lastPlayedSoundTimestamp) {
                                privateMsgSound.currentTime = 0;
                                privateMsgSound.play().catch(err => console.log(err));
                                lastPlayedSoundTimestamp = msgTime;
                            }
                        }
                    }
                });
            }

            let profilePmBadge = document.getElementById('profile-pm-badge');
            if(profilePmBadge) {
                if(totalUnreadPM > 0) {
                    profilePmBadge.innerText = totalUnreadPM;
                    profilePmBadge.style.display = 'block';
                } else {
                    profilePmBadge.style.display = 'none';
                }
            }
        });
    }

    function toggleVoiceRecording() {
        const btn = document.getElementById('voice-record-btn');
        if (!isRecording) {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    let audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    let reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        sendSpecialChatMessage(reader.result, 'voice');
                    }
                };
                mediaRecorder.start();
                isRecording = true;
                recordingSeconds = 0;
                btn.innerText = "🛑 0:00";
                btn.style.color = "red";
                recordingTimerInterval = setInterval(() => {
                    recordingSeconds++;
                    let m = Math.floor(recordingSeconds / 60);
                    let s = recordingSeconds % 60;
                    btn.innerText = `🛑 ${m}:${String(s).padStart(2,'0')}`;
                }, 1000);
            }).catch(err => showSmartAlert("Иҷозати микрофон дода нашуд!"));
        } else {
            clearInterval(recordingTimerInterval);
            mediaRecorder.stop();
            isRecording = false;
            btn.innerText = "🎤";
            btn.style.color = "inherit";
        }
    }

    function handleChatFileSelect(input) {
        if(input.files && input.files[0]) {
            let file = input.files[0];
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                sendSpecialChatMessage(e.target.result, 'file', file.name);
            }
        }
    }

    function sendSpecialChatMessage(fileData, type, fileName = '') {
        if(!currentChatRoomId) return;
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        let msgRef = database.ref(dbPath).push();
        let textPlaceholder = type === 'voice' ? '🎤 Паёми овозӣ' : `📎 Файл: ${fileName}`;

        let msgData = {
            id: msgRef.key,
            phone: userData.phone,
            username: userData.name,
            userImg: userData.img,
            city: userData.city || "",
            text: textPlaceholder,
            fileData: fileData,
            msgType: type,
            fileName: fileName,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            seenBy: {}
        };
        msgData.seenBy[userData.phone] = true;

        msgRef.set(msgData).then(() => {
            if(currentChatType === 'pm') {
                database.ref('private_status/' + currentChatRoomId).update({
                    exists: true,
                    lastMsgText: textPlaceholder,
                    lastSender: userData.phone,
                    read: false,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        });
    }

    function playAudioMsg(btn, audioSrc) {
        let audio = new Audio(audioSrc);
        let timeline = btn.nextElementSibling.querySelector('.audio-progress');
        btn.innerText = "⏸️";
        audio.play();
        audio.ontimeupdate = () => {
            let pct = (audio.currentTime / audio.duration) * 100;
            timeline.style.width = pct + "%";
        };
        audio.onended = () => {
            btn.innerText = "▶️";
            timeline.style.width = "0%";
        };
    }

    // ЗАНГҲОИ АСЛӢ БО AGORA (МАТНИ АСЛИИ КОДИ ШУМО)
    async function startVoiceCall(chatId) {
        let callRoomName = chatId + "_call_" + Math.floor(Math.random() * 10000);
        let targetPhone = chatId.replace(userData.phone, "").replace("_", "");
        
        database.ref('calls/' + targetPhone).set({
            callerPhone: userData.phone,
            callerName: userData.name,
            callerImg: userData.img,
            callType: 'audio',
            roomName: callRoomName,
            status: 'ringing',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            activeCallSession = { targetPhone: targetPhone, role: 'caller', roomName: callRoomName, type: 'audio' };
            showCallScreen('Исходящий аудиозвонок...', userData.name, userData.img, '📞 Танҳо садо');
            dialTone.play().catch(e => console.log(e));
            
            database.ref('calls/' + targetPhone).on('value', async snap => {
                let c = snap.val();
                if(c && c.status === 'accepted') {
                    dialTone.pause();
                    hideCallScreen();
                    database.ref('calls/' + targetPhone).off();
                    
                    await agoraClient.join(AGORA_APP_ID, c.roomName, null, null);
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    await agoraClient.publish([localTracks.audioTrack]);
                    showSmartAlert("Занги аудиоӣ оғоз шуд.");
                } else if (!c || c.status === 'rejected') {
                    dialTone.pause();
                    hideCallScreen();
                    database.ref('calls/' + targetPhone).off();
                    showSmartAlert("Корбар зангро рад кард.");
                }
            });
        });
    }

    function listenForIncomingCalls() {
        if (!userData || !userData.phone) return;
        if (callListenerRef) callListenerRef.off();
        
        callListenerRef = database.ref('calls/' + userData.phone);
        callListenerRef.on('value', snap => {
            let call = snap.val();
            if (call && call.status === 'ringing') {
                activeCallSession = { callerPhone: call.callerPhone, roomName: call.roomName, type: call.callType };
                showCallScreen(
                    'Входящий звонок...', 
                    call.callerName, 
                    call.callerImg || defaultAvatar, 
                    call.callType === 'audio' ? '📞 Аудиозанг' : '📹 Видеовизов'
                );
                dialTone.play().catch(e => console.log(e));
            } else if (!call && document.getElementById('incoming-call-panel').style.display === 'flex') {
                dialTone.pause();
                hideCallScreen();
            }
        });

        agoraClient.on("user-published", async (user, mediaType) => {
            await agoraClient.subscribe(user, mediaType);
            if (mediaType === "video") {
                document.getElementById('agora-video-view').style.display = 'block';
                user.videoTrack.play('agora-video-view');
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });
    }

    function showCallScreen(statusText, name, img, typeText) {
        document.getElementById('call-screen-status').innerText = statusText;
        document.getElementById('call-screen-name').innerText = name;
        document.getElementById('call-screen-avatar').src = img || defaultAvatar;
        document.getElementById('call-screen-type').innerText = typeText;
        document.getElementById('incoming-call-panel').style.display = 'flex';
    }

    function hideCallScreen() {
        document.getElementById('incoming-call-panel').style.display = 'none';
    }

    async function acceptActiveCall() {
        dialTone.pause();
        if (activeCallSession && activeCallSession.roomName) {
            await database.ref('calls/' + userData.phone).update({ status: 'accepted' });
            hideCallScreen();
            
            await agoraClient.join(AGORA_APP_ID, activeCallSession.roomName, null, null);
            localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            
            if (activeCallSession.type === 'video') {
                document.getElementById('agora-video-view').style.display = 'block';
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                localTracks.videoTrack.play('agora-video-view');
                await agoraClient.publish([localTracks.audioTrack, localTracks.videoTrack]);
            } else {
                await agoraClient.publish([localTracks.audioTrack]);
            }
        }
    }

    async function rejectActiveCall() {
        dialTone.pause();
        if (localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
        if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
        document.getElementById('agora-video-view').style.display = 'none';
        await agoraClient.leave();

        if (activeCallSession) {
            if (activeCallSession.role === 'caller') {
                database.ref('calls/' + activeCallSession.targetPhone).remove();
            } else {
                database.ref('calls/' + userData.phone).update({ status: 'rejected' });
                setTimeout(() => { database.ref('calls/' + userData.phone).remove(); }, 1000);
            }
        }
        hideCallScreen();
    }

    function openChat(name, img, roomId, type = 'room') {
        const contactsHeader = document.querySelector('.contacts-sticky-header');
        if (contactsHeader) { contactsHeader.style.display = 'none'; }
        
        currentChatRoomId = roomId;
        currentChatType = type;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        
        let messagesList = document.getElementById('chat-messages-list');
        messagesList.innerHTML = ""; 

        let headerActions = document.getElementById('chat-header-settings-zone');
        let statusSubtitle = document.getElementById('chat-user-status-subtitle');
        statusSubtitle.innerText = ""; 

        if (activeChatHeaderListener) { activeChatHeaderListener.off(); activeChatHeaderListener = null; }
        if (activeTypingListener) { activeTypingListener.off(); activeTypingListener = null; }

        let parts = roomId.split('_');
        let otherPhone = parts[0] === userData.phone ? parts[1] : parts[0];

        if(type === 'pm') {
            headerActions.innerHTML = `
                <button class="call-btn" onclick="startVoiceCall('${roomId}')" title="Занг задан">📞</button>
                <button class="call-btn" onclick="startVideoCall('${roomId}')" title="Видеовизов">📹</button>
                <button class="chat-header-btn" onclick="toggleChatHeaderSettingsDropdown(event)">⚙️</button>
                <div class="chat-header-dropdown" id="chat-header-dropdown-menu">
                    <button id="chat-dropdown-block-btn" onclick="handleBlockFromChatHeader('${roomId}')">Блок кардан</button>
                </div>`;

            activeChatHeaderListener = database.ref('users/' + otherPhone);
            activeChatHeaderListener.on('value', snap => {
                if (snap.exists()) {
                    let otherUser = snap.val();
                    let isOnline = false;
                    if(otherUser.lastActive) {
                        let diff = Date.now() - otherUser.lastActive;
                        if(diff < 12000) isOnline = true;
                    }
                    if (isOnline) {
                        statusSubtitle.innerHTML = `<span style="color:#10b981; font-weight:bold;">в сети 🟢</span>`;
                    } else {
                        statusSubtitle.innerText = "не в сети";
                    }
                }
            });
        } else {
            headerActions.innerHTML = "";
            statusSubtitle.innerText = "Гурӯҳ (Комната)";
        }

        let dbPath = currentChatType === 'room' ? 'messages/' + roomId : 'private_messages/' + roomId;
        database.ref(dbPath).on('value', (snapshot) => {
            if(currentChatRoomId !== roomId) return; 

            let messages = snapshot.val();
            let messagesHTML = "";
            let lastDateStr = "";

            if(messages) {
                let messagesArray = Object.values(messages);
                messagesArray.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

                messagesArray.forEach(m => {
                    let msgDateStr = formatDateDivider(m.timestamp);
                    if(msgDateStr !== lastDateStr) {
                        messagesHTML += `<div class="date-divider"><span>${msgDateStr}</span></div>`;
                        lastDateStr = msgDateStr;
                    }

                    let isMe = m.phone === userData.phone;
                    let wrapperClass = isMe ? "me" : "other";

                    if(currentChatType === 'room' && !isMe && (!m.seenBy || !m.seenBy[userData.phone])) {
                        database.ref(`messages/${roomId}/${m.id}/seenBy/${userData.phone}`).set(true);
                    } else if (currentChatType === 'pm' && !isMe && (!m.seenBy || !m.seenBy[userData.phone])) {
                        database.ref(`private_messages/${roomId}/${m.id}/seenBy/${userData.phone}`).set(true);
                    }

                    let ticksHTML = isMe ? buildTicksHTML(m) : "";
                    let cityLabel = m.city ? ` (${m.city})` : "";
                    let bubbleContentHTML = `<div class="msg-text">${linkify(m.text)}</div>`; 

                    if (m.msgType === 'voice') {
                        bubbleContentHTML = `
                            <div class="audio-player">
                                <button class="audio-play-btn" onclick="playAudioMsg(this, '${m.fileData}')">▶️</button>
                                <div class="audio-timeline"><div class="audio-progress"></div></div>
                            </div>`;
                    } else if (m.msgType === 'file') {
                        if (m.fileData && m.fileData.startsWith('data:image/')) {
                            bubbleContentHTML = `<img src="${m.fileData}" style="max-width:120px; max-height:120px; border-radius:8px; cursor:pointer;" onclick="openImageModal('${m.fileData}')">`;
                        } else {
                            bubbleContentHTML = `<a href="${m.fileData}" download="${m.fileName}" style="color:inherit; text-decoration:underline;">📁 ${m.fileName || 'Файл'}</a>`;
                        }
                    }

                    messagesHTML += `
                        <div class="msg-wrapper ${wrapperClass}">
                            <img src="${m.userImg || defaultAvatar}" class="msg-avatar">
                            <div class="msg-body">
                                <span class="msg-username">${m.username}${cityLabel}</span>
                                <div class="msg-bubble">
                                    ${bubbleContentHTML}
                                    <div class="msg-footer">
                                        <span>${formatTime(m.timestamp)}</span>
                                        ${ticksHTML}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
            }
            
            messagesList.innerHTML = messagesHTML;
            messagesList.scrollTop = messagesList.scrollHeight; 
        });
    }

    function handleBlockFromChatHeader(roomId) {
        let dropdown = document.getElementById('chat-header-dropdown-menu');
        if (dropdown) dropdown.style.display = 'none';

        database.ref('private_status/' + roomId).once('value', snapshot => {
            let statusInfo = snapshot.val() || {};
            let isBlockedByMe = statusInfo.blockedUsers ? !!statusInfo.blockedUsers[userData.phone] : false;
            toggleBlockUserPM(roomId, isBlockedByMe);
        });
    }

    function sendMessage() {
        let input = document.getElementById('message-input');
        if(!input) return; 
        let text = input.value.trim();
        if(!text || !currentChatRoomId) return;

        if (currentChatType === 'pm') {
            database.ref('private_status/' + currentChatRoomId).once('value', snapshot => {
                let statusInfo = snapshot.val() || {};
                let parts = currentChatRoomId.split('_');
                let otherPhone = parts[0] === userData.phone ? parts[1] : parts[0];
                let isBlockedByMe = statusInfo.blockedUsers ? !!statusInfo.blockedUsers[userData.phone] : false;
                let isBlockedByOther = statusInfo.blockedUsers ? !!statusInfo.blockedUsers[otherPhone] : false;

                if (isBlockedByMe || isBlockedByOther) {
                    showSmartAlert("Ирсоли паём ғайриимкон аст!");
                    return;
                }
                executeMessageSend(text, input);
            });
        } else {
            executeMessageSend(text, input);
        }
    }

    function executeMessageSend(text, input) {
        let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
        let msgRef = database.ref(dbPath).push();
        
        let msgData = {
            id: msgRef.key,
            phone: userData.phone,
            username: userData.name,
            userImg: userData.img,
            city: userData.city || "",
            text: text,
            msgType: 'text',
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            seenBy: {}
        };
        msgData.seenBy[userData.phone] = true;

        msgRef.set(msgData).then(() => {
            database.ref(`typing/${currentChatRoomId}/${userData.phone}`).remove();
            
            if(currentChatType === 'pm') {
                database.ref('private_status/' + currentChatRoomId).update({
                    exists: true,
                    lastMsgText: text,
                    lastSender: userData.phone,
                    read: false,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
            if(input) {
                input.value = "";
                if(input.style) input.style.height = "40px";
            }
        });
    }

    function createRoom() {
        let name = document.getElementById('room-name').value.trim();
        let pass = document.getElementById('room-pass').value.trim();
        let fileInput = document.getElementById('room-icon');

        if(!name) { showSmartAlert("Лутфан номи комнатаро нависед!"); return; }

        let roomRef = database.ref('rooms').push();
        let roomData = {
            id: roomRef.key,
            name: name,
            pass: pass || "",
            creatorPhone: userData.phone,
            creatorName: userData.name,
            img: defaultAvatar,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            isSecret: false,
            onlyAdminCanWrite: false
        };

        let saveRoom = () => {
            roomRef.set(roomData).then(() => {
                toggleRoomForm(false);
                document.getElementById('room-name').value = "";
                document.getElementById('room-pass').value = "";
                document.getElementById('room-icon').value = "";
                showSmartAlert("Комната сохта шуд!");
            });
        }

        if(fileInput && fileInput.files && fileInput.files[0]) {
            compressImage(fileInput.files[0], function(compressedUrl) {
                roomData.img = compressedUrl;
                saveRoom();
            });
        } else { saveRoom(); }
    }

    function deleteRoom(roomId) {
        showSmartConfirm("Оё мехоҳед ин комнатаро нест кунед?", function(yes) {
            if(yes) {
                database.ref('rooms/' + roomId).remove();
                database.ref('messages/' + roomId).remove();
            }
        });
    }

    function shareRoom(roomId) {
        let roomLink = window.location.origin + window.location.pathname + "?room=" + roomId;
        navigator.clipboard.writeText(roomLink).then(() => {
            showSmartAlert("Истиноди комната нусхабардорӣ шуд!\n\n" + roomLink);
        });
    }

    async function exitAndClearActiveChat() {
        if (localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
        if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
        document.getElementById('agora-video-view').style.display = 'none';
        await agoraClient.leave();

        const contactsHeader = document.querySelector('.contacts-sticky-header');
        if (contactsHeader) { contactsHeader.style.display = 'block'; }
        
        if (currentChatRoomId) {
            database.ref(`typing/${currentChatRoomId}/${userData.phone}`).remove();
            let dbPath = currentChatType === 'room' ? 'messages/' + currentChatRoomId : 'private_messages/' + currentChatRoomId;
            database.ref(dbPath).off();
        }
        
        document.getElementById('chat-window').style.display = 'none';
        currentChatRoomId = "";

        if (currentChatType === 'pm') {
            renderContactsListReal();
        } else {
            renderActiveChats(); 
        }

        const profileBtn = document.querySelector('.nav-item[onclick*="profile-screen"]');
        switchScreen('profile-screen', profileBtn);
    }

    function openImageModal(imgSrc) {
        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');
        const downloadBtn = document.getElementById('download-btn');
        
        if (modal && modalImg) {
            modal.style.display = 'flex';
            modalImg.src = imgSrc;
            if (downloadBtn) downloadBtn.href = imgSrc;
        }
    }

    document.getElementById('image-modal').addEventListener('click', function(e) {
        if (e.target.id === 'modal-img' || e.target.id === 'download-btn') return;
        this.style.display = 'none';
    });

    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return `<a href="${url}" target="_blank" style="color: #60a5fa; text-decoration: underline; font-weight: bold; word-break: break-all;">${url}</a>`;
        });
    }

    function monitorAccountSecurity() {
        if (!userData || !userData.phone) return;
        database.ref('users/' + userData.phone).on('value', (snapshot) => {
            if (!snapshot.exists()) {
                localStorage.clear(); 
                location.reload(); 
            }
        });
    }
</script>
