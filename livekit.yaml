# =========================================================================
# Конфигуратсияи сервери LiveKit (self-hosted)
# Ин файл ба ҷои coturn-и алоҳида кор мекунад — LiveKit худаш TURN/TLS дорад.
#
# Ҷойгиркунӣ: VPS-и шумо БОЯД берун аз Русия бошад (масалан ЕС, Туркия ва ғ.)
# =========================================================================

port: 7880          # Порти signaling (WebSocket, дар паси reverse-proxy/HTTPS)

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true     # Муҳим: LiveKit IP-и берунии серверро худкор муайян мекунад

# --- TURN бо TLS дар порти 443 (қисми муҳимтарин барои гузаштан аз DPI) ---
turn:
  enabled: true
  domain: turn.yourdomain.com        # Домени шумо, ки ба IP-и сервер ишора мекунад
  tls_port: 443                      # Порти "ниқобдор" — мисли HTTPS-и муқаррарӣ
  udp_port: 3478                     # Барои шабакаҳое, ки маҳдудият надоранд (fallback)
  cert_file: /etc/livekit/certs/fullchain.pem
  key_file: /etc/livekit/certs/privkey.pem

# --- Калидҳои API (ҳамон API_KEY/API_SECRET, ки дар Cloudflare Worker истифода мешаванд) ---
keys:
  # Формат:  КАЛИД: СИР
  # Калиди намунавӣ — ҳатман бо калиди худатон иваз кунед (масалан бо: openssl rand -hex 16)
  APIkey1234567890: "ГУЗОРЕД_СИРРИ_ДАРОЗИ_ХУДРО_ИНҶО"

# --- Танзимоти ҳуҷра ---
room:
  auto_create: true          # Ҳуҷра худкор сохта мешавад, вақте иштирокчии аввал пайваст мешавад
  empty_timeout: 300          # 5 дақиқа пас аз холӣ шудан, ҳуҷра худкор хомӯш мешавад
  max_participants: 2048

log_level: info
